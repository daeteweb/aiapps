name: Auto Update Sidebar List

on:
  push:
    paths:
      - 'apps/**'
  workflow_dispatch: # 讓你可以手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Metadata Filelist
        run: |
          echo "Scanning apps folder..."
          echo "[" > filelist.json
          FIRST=true
          # 遍歷 apps 資料夾下的所有 html
          for f in apps/*.html; do
            if [ -e "$f" ]; then
              # 嘗試抓取標題，抓不到就用檔案名稱代替
              TITLE=$(grep -oP '(?<=<title>).*?(?=</title>)' "$f" | head -1 || echo "")
              if [ -z "$TITLE" ]; then
                TITLE=$(basename "$f")
              fi
              
              if [ "$FIRST" = true ]; then FIRST=false; else echo "," >> filelist.json; fi
              echo "{\"path\": \"$f\", \"title\": \"$TITLE\"}" >> filelist.json
            fi
          done
          echo "]" >> filelist.json
          cat filelist.json # 在 Log 裡印出來檢查

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add filelist.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update filelist.json" && git push)
