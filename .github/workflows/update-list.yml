name: Auto Update Sidebar List

on:
  push:
    paths:
      - '*.html'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Metadata Filelist
        run: |
          echo "[" > filelist.json
          first=true
          for f in *.html; do
            # 排除 index.html 避免無限迴圈
            if [ "$f" != "index.html" ]; then
              # 抓取 <title> 標籤內容，若無則顯示檔名
              title=$(grep -oP '(?<=<title>).*?(?=</title>)' "$f" || echo "$f")
              if [ "$first" = true ]; then first=false; else echo "," >> filelist.json; fi
              echo "{\"path\": \"$f\", \"title\": \"$title\"}" >> filelist.json
            fi
          done
          echo "]" >> filelist.json

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add filelist.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update filelist.json" && git push)
