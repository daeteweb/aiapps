name: Auto Update Sidebar List

on:
  push:
    paths:
      - 'apps/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Metadata Filelist
        run: |
          python3 << 'EOF'
          import json, glob, re, os

          # 讀取舊的 filelist.json，保留已填寫的 description
          old_descriptions = {}
          if os.path.exists('filelist.json'):
              try:
                  with open('filelist.json', 'r', encoding='utf-8') as f:
                      old_data = json.load(f)
                  for item in old_data:
                      if item.get('description', '').strip():
                          old_descriptions[item['path']] = item['description']
              except Exception as e:
                  print(f"警告：無法讀取舊的 filelist.json：{e}")

          # 掃描 apps/*.html
          result = []
          for filepath in sorted(glob.glob('apps/*.html')):
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
              except Exception as e:
                  print(f"警告：無法讀取 {filepath}：{e}")
                  continue

              # 抓取 <title>
              match = re.search(r'<title>(.*?)</title>', content, re.IGNORECASE | re.DOTALL)
              title = match.group(1).strip() if match else os.path.basename(filepath)

              result.append({
                  "path": filepath,
                  "title": title,
                  "description": old_descriptions.get(filepath, "")
              })

          # 寫出新的 filelist.json
          with open('filelist.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print("✅ filelist.json 已更新：")
          print(json.dumps(result, ensure_ascii=False, indent=2))
          EOF

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add filelist.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update filelist.json" && git push)
