name: Auto Update Sidebar List

on:
  push:
    paths:
      - 'apps/*.html'  # 監控 apps 資料夾下的變動

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Metadata Filelist
        run: |
          echo "[" > filelist.json
          first=true
          # 掃描 apps 資料夾
          for f in apps/*.html; do
            if [ -f "$f" ]; then
              title=$(grep -oP '(?<=<title>).*?(?=</title>)' "$f" || echo "$f")
              if [ "$first" = true ]; then first=false; else echo "," >> filelist.json; fi
              # 將路徑存入 JSON
              echo "{\"path\": \"$f\", \"title\": \"$title\"}" >> filelist.json
            fi
          done
          echo "]" >> filelist.json

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add filelist.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update filelist.json" && git push)
