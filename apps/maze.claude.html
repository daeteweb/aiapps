<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>迷宮挑戰</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;700&display=swap');

  :root {
    --bg: #080c10;
    --panel: #0d1520;
    --border: #1a2a3a;
    --wall: #1e3a5f;
    --wall-glow: #2a5a8f;
    --player: #00e5ff;
    --player-glow: rgba(0,229,255,0.6);
    --goal: #ff4444;
    --goal-glow: rgba(255,68,68,0.5);
    --gold: #ffd700;
    --text: #a8c8e8;
    --text-bright: #e0f0ff;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text-bright);
    font-family: var(--sans);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── TOP BAR ── */
  #topbar {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 6px;
    gap: 8px;
    flex-shrink: 0;
  }

  .stat-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 70px;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--player);
    line-height: 1.2;
  }
  #timer-val { min-width: 70px; text-align: center; }
  #timer-val.danger { color: var(--goal); animation: pulse 0.5s infinite alternate; }

  /* difficulty selector */
  #diff-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }
  .stat-label-center {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text);
    letter-spacing: 1.5px;
  }
  #diff-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  #diff-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--player);
    box-shadow: 0 0 8px var(--player-glow);
    cursor: pointer;
  }
  #diff-label {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--gold);
  }

  /* new game btn */
  #new-btn {
    background: var(--panel);
    border: 1px solid var(--player);
    color: var(--player);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    box-shadow: 0 0 10px rgba(0,229,255,0.15);
  }
  #new-btn:hover { background: rgba(0,229,255,0.1); box-shadow: 0 0 16px var(--player-glow); }
  #new-btn:active { transform: scale(0.95); }

  /* ── CANVAS AREA ── */
  #game-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none;
    padding: 4px;
    min-height: 0;
  }

  canvas {
    display: block;
    border-radius: 4px;
    box-shadow: 0 0 30px rgba(0,60,120,0.4);
  }

  /* ── STEPS BAR ── */
  #steps-bar {
    flex-shrink: 0;
    padding: 4px 16px 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    letter-spacing: 1px;
  }
  #steps-bar span { color: var(--gold); }

  /* ── MODAL ── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  #modal-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  #modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    width: min(360px, 90vw);
    text-align: center;
    transform: scale(0.85);
    transition: transform .3s;
    box-shadow: 0 0 60px rgba(0,100,200,0.3);
  }
  #modal-overlay.show #modal { transform: scale(1); }

  .modal-icon {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
  }
  .modal-title {
    font-family: var(--mono);
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .modal-stats {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    margin-bottom: 24px;
    line-height: 2;
  }
  .modal-stats b { color: var(--player); }

  .modal-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .modal-btn {
    border-radius: 10px;
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1px solid;
    transition: all .2s;
    min-width: 120px;
  }
  .btn-same {
    background: rgba(0,229,255,0.08);
    border-color: var(--player);
    color: var(--player);
  }
  .btn-same:hover { background: rgba(0,229,255,0.18); box-shadow: 0 0 16px var(--player-glow); }
  .btn-harder {
    background: rgba(255,215,0,0.08);
    border-color: var(--gold);
    color: var(--gold);
  }
  .btn-harder:hover { background: rgba(255,215,0,0.18); box-shadow: 0 0 16px rgba(255,215,0,0.4); }

  /* ── HINT TOAST ── */
  #hint {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,229,255,0.15);
    border: 1px solid var(--player);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--player);
    letter-spacing: 1px;
    opacity: 0;
    transition: all .4s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 50;
  }
  #hint.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── SWIPE INDICATOR ── */
  #swipe-hint {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(168,200,232,0.4);
    letter-spacing: 1px;
    pointer-events: none;
    transition: opacity 1s;
  }

  @keyframes pulse {
    from { opacity: 1; }
    to { opacity: 0.4; }
  }

  /* ── WIN PARTICLES ── */
  .particle {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    animation: fly 1.2s ease-out forwards;
    z-index: 90;
  }
  @keyframes fly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="stat-box">
    <span class="stat-label">TIME</span>
    <span class="stat-value" id="timer-val">00:00</span>
  </div>

  <div id="diff-wrap">
    <span class="stat-label-center">DIFFICULTY</span>
    <input type="range" id="diff-slider" min="5" max="30" value="12" step="1">
    <span id="diff-label">12 × 12</span>
  </div>

  <button id="new-btn" onclick="startNewGame()">NEW</button>
</div>

<!-- CANVAS -->
<div id="game-wrap">
  <canvas id="mazeCanvas"></canvas>
</div>

<!-- STEPS -->
<div id="steps-bar">STEPS&nbsp;<span id="steps-val">0</span>&emsp;BEST&nbsp;<span id="best-val">—</span></div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <span class="modal-icon" id="modal-icon">🎉</span>
    <div class="modal-title" id="modal-title">ESCAPED!</div>
    <div class="modal-stats" id="modal-stats"></div>
    <div class="modal-btns">
      <button class="modal-btn btn-same" onclick="modalChoice('same')">同難度再來</button>
      <button class="modal-btn btn-harder" onclick="modalChoice('harder')">提升難度 +1</button>
    </div>
  </div>
</div>

<!-- HINT TOAST -->
<div id="hint" id="hint"></div>

<!-- SWIPE HINT -->
<div id="swipe-hint" id="swipe-hint">SWIPE ANYWHERE TO MOVE</div>

<script>
// ── STATE ──────────────────────────────────────────────
const canvas = document.getElementById('mazeCanvas');
const ctx    = canvas.getContext('2d');

let cols, rows, cellSize;
let grid = [];
let player = {x:0, y:0};
let goal   = {x:0, y:0};

let timerInterval = null;
let startTime     = 0;
let elapsedMs     = 0;
let steps         = 0;
let bestTimes     = {};  // key: "NxN" -> ms
let bestSteps     = {};  // key: "NxN" -> steps
let gameRunning   = false;

let lastPointerX, lastPointerY;
let isPointerDown = false;
const MOVE_THRESHOLD = 22;

// ── SLIDER ─────────────────────────────────────────────
const slider    = document.getElementById('diff-slider');
const diffLabel = document.getElementById('diff-label');

slider.addEventListener('input', () => {
  const v = slider.value;
  diffLabel.textContent = `${v} × ${v}`;
});

// ── CELL CLASS ─────────────────────────────────────────
class Cell {
  constructor(r, c) {
    this.r = r; this.c = c;
    this.walls   = {top:true, right:true, bottom:true, left:true};
    this.visited = false;
  }
  draw() {
    const x = this.c * cellSize;
    const y = this.r * cellSize;
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    if (this.walls.top)    { ctx.moveTo(x,           y);           ctx.lineTo(x+cellSize, y);           }
    if (this.walls.right)  { ctx.moveTo(x+cellSize,  y);           ctx.lineTo(x+cellSize, y+cellSize);  }
    if (this.walls.bottom) { ctx.moveTo(x,           y+cellSize);  ctx.lineTo(x+cellSize, y+cellSize);  }
    if (this.walls.left)   { ctx.moveTo(x,           y);           ctx.lineTo(x,          y+cellSize);  }
    ctx.stroke();
  }
}

// ── MAZE GENERATION (Recursive Backtracker) ─────────────
function buildGrid() {
  grid = [];
  for (let r = 0; r < rows; r++) {
    let row = [];
    for (let c = 0; c < cols; c++) row.push(new Cell(r,c));
    grid.push(row);
  }
}

function generateMaze() {
  let cur = grid[0][0];
  cur.visited = true;
  let stack = [cur];
  while (stack.length) {
    let nbrs = [];
    const {r,c} = cur;
    if (r > 0      && !grid[r-1][c].visited) nbrs.push(grid[r-1][c]);
    if (c < cols-1 && !grid[r][c+1].visited) nbrs.push(grid[r][c+1]);
    if (r < rows-1 && !grid[r+1][c].visited) nbrs.push(grid[r+1][c]);
    if (c > 0      && !grid[r][c-1].visited) nbrs.push(grid[r][c-1]);

    if (nbrs.length) {
      let nxt = nbrs[Math.floor(Math.random()*nbrs.length)];
      nxt.visited = true;
      stack.push(cur);
      let dx = cur.c - nxt.c, dy = cur.r - nxt.r;
      if (dx === 1)  { cur.walls.left   = false; nxt.walls.right  = false; }
      if (dx === -1) { cur.walls.right  = false; nxt.walls.left   = false; }
      if (dy === 1)  { cur.walls.top    = false; nxt.walls.bottom = false; }
      if (dy === -1) { cur.walls.bottom = false; nxt.walls.top    = false; }
      cur = nxt;
    } else {
      cur = stack.pop();
    }
  }
}

// ── CANVAS SIZE ─────────────────────────────────────────
function calcCanvasSize() {
  const wrap = document.getElementById('game-wrap');
  const avW  = wrap.clientWidth  - 8;
  const avH  = wrap.clientHeight - 8;
  const side = Math.floor(Math.min(avW, avH) / cols) * cols;
  return side;
}

// ── RENDER ──────────────────────────────────────────────
function render() {
  ctx.fillStyle = '#080c10';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // slight path tint for visited (breath of life)
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) grid[r][c].draw();

  // goal
  const gx = goal.x * cellSize + cellSize*.18;
  const gy = goal.y * cellSize + cellSize*.18;
  const gs = cellSize * .64;
  ctx.save();
  ctx.shadowBlur  = 18;
  ctx.shadowColor = 'rgba(255,68,68,0.7)';
  ctx.fillStyle   = '#ff4444';
  ctx.beginPath();
  ctx.roundRect(gx, gy, gs, gs, 4);
  ctx.fill();
  ctx.restore();

  // player
  const px = player.x * cellSize + cellSize*.18;
  const py = player.y * cellSize + cellSize*.18;
  const ps = cellSize * .64;
  ctx.save();
  ctx.shadowBlur  = 20;
  ctx.shadowColor = 'rgba(0,229,255,0.8)';
  ctx.fillStyle   = '#00e5ff';
  ctx.beginPath();
  ctx.roundRect(px, py, ps, ps, 5);
  ctx.fill();
  ctx.restore();
}

// ── MOVE ────────────────────────────────────────────────
function move(dir) {
  if (!gameRunning) return;
  const cell = grid[player.y][player.x];
  let moved = false;
  if (dir==='up'    && !cell.walls.top)    { player.y--; moved=true; }
  if (dir==='down'  && !cell.walls.bottom) { player.y++; moved=true; }
  if (dir==='left'  && !cell.walls.left)   { player.x--; moved=true; }
  if (dir==='right' && !cell.walls.right)  { player.x++; moved=true; }
  if (moved) {
    steps++;
    document.getElementById('steps-val').textContent = steps;
    render();
    if (player.x === goal.x && player.y === goal.y) winGame();
  }
}

// ── TIMER ───────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 500);
}
function stopTimer() {
  clearInterval(timerInterval);
  elapsedMs = Date.now() - startTime;
}
function updateTimer() {
  const ms  = Date.now() - startTime;
  const s   = Math.floor(ms/1000);
  const mm  = String(Math.floor(s/60)).padStart(2,'0');
  const ss  = String(s % 60).padStart(2,'0');
  const el  = document.getElementById('timer-val');
  el.textContent = `${mm}:${ss}`;
  el.classList.toggle('danger', s >= 180);
}
function fmtTime(ms) {
  const s  = Math.floor(ms/1000);
  const mm = String(Math.floor(s/60)).padStart(2,'0');
  const ss = String(s % 60).padStart(2,'0');
  return `${mm}:${ss}`;
}

// ── WIN ─────────────────────────────────────────────────
function winGame() {
  stopTimer();
  gameRunning = false;
  spawnParticles();

  const key  = `${cols}x${rows}`;
  const prev = bestTimes[key];
  const isNewBest = !prev || elapsedMs < prev;
  if (isNewBest) {
    bestTimes[key] = elapsedMs;
    bestSteps[key] = steps;
    document.getElementById('best-val').textContent = fmtTime(elapsedMs);
  }

  let statsHtml = `時間 <b>${fmtTime(elapsedMs)}</b>&emsp;步數 <b>${steps}</b>`;
  if (isNewBest) statsHtml += `<br>🏆 最佳紀錄！`;
  else statsHtml += `<br>最佳 <b>${fmtTime(prev)}</b>`;

  document.getElementById('modal-stats').innerHTML = statsHtml;
  document.getElementById('modal-icon').textContent = isNewBest ? '🏆' : '🎉';
  document.getElementById('modal-title').textContent = isNewBest ? 'NEW BEST!' : 'ESCAPED!';
  showModal();
}

function spawnParticles() {
  const cx = (goal.x + .5) * cellSize;
  const cy = (goal.y + .5) * cellSize;
  const rect = canvas.getBoundingClientRect();
  for (let i=0; i<24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random()*Math.PI*2;
    const dist  = 60+Math.random()*120;
    const colors = ['#00e5ff','#ffd700','#ff4444','#44ff99','#ffffff'];
    const size  = 4+Math.random()*8;
    p.style.cssText = `
      left:${rect.left+cx}px; top:${rect.top+cy}px;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --tx:${Math.cos(angle)*dist}px; --ty:${Math.sin(angle)*dist}px;
      animation-delay:${Math.random()*0.3}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

// ── MODAL ───────────────────────────────────────────────
function showModal() {
  document.getElementById('modal-overlay').classList.add('show');
}
function hideModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
function modalChoice(type) {
  hideModal();
  if (type === 'harder') {
    const newN = Math.min(parseInt(slider.value)+1, 30);
    slider.value = newN;
    diffLabel.textContent = `${newN} × ${newN}`;
  }
  startNewGame();
}

// ── START / RESET ────────────────────────────────────────
function startNewGame() {
  hideModal();
  clearInterval(timerInterval);

  cols = parseInt(slider.value);
  rows = cols;

  const side = calcCanvasSize();
  canvas.width  = side;
  canvas.height = side;
  cellSize = side / cols;

  buildGrid();
  generateMaze();

  player  = {x:0, y:0};
  goal    = {x:cols-1, y:rows-1};
  steps   = 0;
  gameRunning = true;

  document.getElementById('steps-val').textContent = '0';
  document.getElementById('timer-val').textContent = '00:00';
  document.getElementById('timer-val').classList.remove('danger');

  const key = `${cols}x${rows}`;
  const b   = bestTimes[key];
  document.getElementById('best-val').textContent = b ? fmtTime(b) : '—';

  render();
  startTimer();
  hideSwiperHint();
}

// ── SWIPE HINT ───────────────────────────────────────────
let swipeHintHidden = false;
function hideSwiperHint() {
  if (swipeHintHidden) return;
  const el = document.getElementById('swipe-hint');
  setTimeout(()=>{ el.style.opacity='0'; }, 3000);
  swipeHintHidden = true;
}

// ── SHOW TOAST ───────────────────────────────────────────
function showHint(msg) {
  const el = document.getElementById('hint');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── INPUT: KEYBOARD ──────────────────────────────────────
window.addEventListener('keydown', e => {
  const map = {
    ArrowUp:'up', w:'up', ArrowDown:'down', s:'down',
    ArrowLeft:'left', a:'left', ArrowRight:'right', d:'right'
  };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// ── INPUT: POINTER (swipe anywhere) ──────────────────────
window.addEventListener('pointerdown', e => {
  if (e.target.closest('#topbar, #modal-overlay, #new-btn')) return;
  isPointerDown = true;
  lastPointerX = e.clientX;
  lastPointerY = e.clientY;
});

window.addEventListener('pointermove', e => {
  if (!isPointerDown) return;
  const dx = e.clientX - lastPointerX;
  const dy = e.clientY - lastPointerY;
  if (Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD) {
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
    else                              move(dy > 0 ? 'down'  : 'up');
    lastPointerX = e.clientX;
    lastPointerY = e.clientY;
  }
});

window.addEventListener('pointerup',     () => isPointerDown = false);
window.addEventListener('pointercancel', () => isPointerDown = false);

// ── RESIZE ───────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!gameRunning && !grid.length) return;
    const side = calcCanvasSize();
    canvas.width  = side;
    canvas.height = side;
    cellSize = side / cols;
    render();
  }, 150);
});

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('load', () => {
  diffLabel.textContent = `${slider.value} × ${slider.value}`;
  startNewGame();
});
</script>
</body>
</html>
