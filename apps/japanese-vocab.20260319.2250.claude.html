<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日文單詞記憶卡</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --surface: #1a1915;
  --surface2: #232218;
  --border: #2e2c24;
  --gold: #c9a84c;
  --gold-dim: #7a6330;
  --text: #e8e2d4;
  --text-muted: #6b6455;
  --text-dim: #9a9080;
  --green: #4a9e6a;
  --green-bg: #0d2018;
  --red: #c0503a;
  --red-bg: #200e0a;
  --blue: #4a80c0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 16px 48px;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 100%, rgba(74,128,192,0.03) 0%, transparent 55%);
}

/* ── Header ── */
.header {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0 16px;
}
.logo {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300; font-size: 1rem;
  color: var(--gold); letter-spacing: 0.3em;
}
.icon-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-dim); padding: 7px 12px; border-radius: 4px;
  font-size: 0.72rem; cursor: pointer; letter-spacing: 0.05em;
  font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

/* ── Level Selector ── */
.level-selector {
  width: 100%; max-width: 480px;
  margin-bottom: 14px;
}
.level-label {
  font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.15em;
  margin-bottom: 8px;
}
.level-btns {
  display: flex; gap: 6px;
}
.level-btn {
  flex: 1; padding: 10px 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 6px; cursor: pointer;
  text-align: center; transition: all 0.15s;
  position: relative;
}
.level-btn:hover { border-color: var(--gold-dim); }
.level-btn.active {
  border-color: var(--gold);
  background: var(--surface2);
}
.level-btn .lv-name {
  font-family: 'DM Serif Display', serif;
  font-size: 1rem; color: var(--text-dim);
  display: block; line-height: 1;
  transition: color 0.15s;
}
.level-btn.active .lv-name { color: var(--gold); }
.level-btn .lv-bar-wrap {
  height: 2px; background: var(--border);
  border-radius: 1px; margin: 5px 4px 0;
  overflow: hidden;
}
.level-btn .lv-bar {
  height: 100%; background: var(--green);
  border-radius: 1px; transition: width 0.4s ease;
}
.level-btn .lv-count {
  font-size: 0.55rem; color: var(--text-muted);
  letter-spacing: 0.05em; margin-top: 3px;
  display: block;
}

/* ── Pool Status ── */
.pool-status {
  width: 100%; max-width: 480px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px; margin-bottom: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.pool-row { display: flex; justify-content: space-between; align-items: center; }
.pool-label { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.08em; }
.pool-numbers { display: flex; gap: 18px; }
.pool-stat { text-align: center; font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.05em; line-height: 1.6; }
.pool-stat strong { display: block; font-size: 1.15rem; font-weight: 500; font-family: 'DM Serif Display', serif; }
.pool-stat.s-pool strong { color: var(--gold); }
.pool-stat.s-learned strong { color: var(--green); }
.pool-stat.s-remain strong { color: var(--text-dim); }
.pool-bar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; display: flex; }
.pool-bar-learned { background: var(--green); height: 100%; transition: width 0.4s ease; }
.pool-bar-again { background: var(--red); height: 100%; transition: width 0.4s ease; }
.pool-bar-fresh { background: var(--gold-dim); height: 100%; transition: width 0.4s ease; }
.pool-list-toggle { font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.08em; cursor: pointer; text-align: center; padding: 4px 0; transition: color 0.15s; }
.pool-list-toggle:hover { color: var(--gold); }
.pool-list { display: none; flex-wrap: wrap; gap: 5px; max-height: 130px; overflow-y: auto; }
.pool-list.open { display: flex; }
.pool-word-chip { font-family: 'Noto Serif JP', serif; font-size: 0.8rem; padding: 3px 9px; border-radius: 3px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); }
.pool-word-chip.again { border-color: rgba(192,80,58,0.4); color: var(--red); }

/* ── Filter tabs ── */
.filter-tabs { width: 100%; max-width: 480px; display: flex; gap: 6px; margin-bottom: 18px; }
.tab { flex: 1; padding: 9px 4px; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif; font-size: 0.73rem; border-radius: 4px; cursor: pointer; letter-spacing: 0.03em; transition: all 0.15s; text-align: center; }
.tab.active { background: var(--surface2); border-color: var(--gold-dim); color: var(--gold); }

/* ── Card ── */
.card-area { width: 100%; max-width: 480px; perspective: 1200px; margin-bottom: 18px; }
.card-wrapper { position: relative; width: 100%; height: 265px; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; }
.card-wrapper.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 28px 24px; }
.card-front { background: var(--surface); background-image: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.07), transparent 65%); }
.card-back { background: var(--surface2); transform: rotateY(180deg); background-image: radial-gradient(ellipse at 50% 100%, rgba(74,128,192,0.07), transparent 65%); }
.card-corner { position: absolute; top: 13px; right: 15px; font-size: 0.63rem; color: var(--text-muted); letter-spacing: 0.05em; }
.card-level-badge { position: absolute; top: 13px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; letter-spacing: 0.12em; color: var(--gold-dim); font-family: 'DM Serif Display', serif; }
.card-category { font-size: 0.63rem; letter-spacing: 0.2em; color: var(--gold-dim); font-family: 'Noto Sans TC', sans-serif; }
.card-jp { font-family: 'Noto Serif JP', serif; font-size: clamp(44px, 13vw, 68px); font-weight: 300; color: var(--text); line-height: 1; text-align: center; }
.card-flip-hint { font-size: 0.62rem; color: var(--text-muted); letter-spacing: 0.15em; position: absolute; bottom: 13px; }
.card-reading { font-family: 'Noto Serif JP', serif; font-size: 1.35rem; color: var(--gold); letter-spacing: 0.1em; }
.card-meaning { font-size: 1.55rem; font-weight: 500; color: var(--text); letter-spacing: 0.05em; font-family: 'DM Serif Display', serif; }
.card-romaji { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.1em; }
.status-dot { position: absolute; top: 13px; left: 15px; width: 7px; height: 7px; border-radius: 50%; background: transparent; border: 1.5px solid var(--border); transition: all 0.3s; }
.status-dot.again { background: var(--red); border-color: var(--red); }
.new-badge { position: absolute; top: 13px; left: 24px; font-size: 0.58rem; letter-spacing: 0.12em; color: var(--blue); border: 1px solid var(--blue); border-radius: 3px; padding: 2px 5px; opacity: 0; transition: opacity 0.3s; }
.new-badge.show { opacity: 1; }

@keyframes slideIn { from { opacity: 0; transform: translateX(28px) scale(0.96); } to { opacity: 1; transform: translateX(0) scale(1); } }
.card-area.animate { animation: slideIn 0.32s cubic-bezier(0.23,1,0.32,1); }

/* ── Actions ── */
.actions { width: 100%; max-width: 480px; display: flex; gap: 10px; margin-bottom: 18px; }
.action-btn { flex: 1; padding: 15px; border-radius: 6px; border: 1px solid; font-family: 'Noto Sans TC', sans-serif; font-size: 0.82rem; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-learned { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.btn-learned:hover { background: var(--green); color: #fff; }
.btn-again { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.btn-again:hover { background: var(--red); color: #fff; }
.btn-skip { background: var(--surface); border-color: var(--border); color: var(--text-muted); flex: 0.55; }
.btn-skip:hover { border-color: var(--text-dim); color: var(--text); }

.session-info { width: 100%; max-width: 480px; display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.05em; padding: 0 2px; }
.session-info span { color: var(--text-dim); }

/* ── Empty state ── */
.empty-state { width: 100%; max-width: 480px; text-align: center; padding: 60px 24px; border: 1px dashed var(--border); border-radius: 12px; display: none; }
.empty-state .big { font-family: 'Noto Serif JP', serif; font-size: 3rem; color: var(--gold); margin-bottom: 16px; }
.empty-state p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.8; }
.empty-refill { margin-top: 20px; padding: 12px 24px; background: transparent; border: 1px solid var(--gold-dim); color: var(--gold); border-radius: 6px; font-family: 'Noto Sans TC', sans-serif; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; }
.empty-refill:hover { background: var(--gold); color: var(--bg); }

/* ── Modal ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px 24px; width: 100%; max-width: 420px; max-height: 85vh; overflow-y: auto; }
.modal h2 { font-family: 'Noto Serif JP', serif; font-size: 1rem; color: var(--gold); margin-bottom: 18px; letter-spacing: 0.1em; }
.modal-section { margin-bottom: 16px; }
.modal-section-label { font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 8px; }
.modal-row { display: flex; gap: 10px; }
.modal-btn { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); font-family: 'Noto Sans TC', sans-serif; font-size: 0.78rem; cursor: pointer; transition: all 0.15s; }
.modal-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
.modal-btn.danger { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.modal-btn.danger:hover { background: var(--red); color: #fff; }
.modal-stats { font-size: 0.78rem; color: var(--text-muted); line-height: 2.1; letter-spacing: 0.03em; border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; background: var(--bg); margin-top: 4px; }
.modal-stats span { color: var(--text-dim); }
.modal-close { width: 100%; padding: 12px; margin-top: 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif; font-size: 0.8rem; cursor: pointer; }
.slider-row { display: flex; align-items: center; gap: 12px; margin-top: 6px; }
.slider-row input[type=range] { flex: 1; accent-color: var(--gold); }
.slider-val { font-size: 0.85rem; color: var(--gold); min-width: 28px; text-align: right; font-family: 'DM Serif Display', serif; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">単語帳</div>
  <button class="icon-btn" onclick="openModal()">⚙ 選項</button>
</div>

<!-- Level Selector -->
<div class="level-selector">
  <div class="level-label">JLPT 單字池</div>
  <div class="level-btns" id="level-btns">
    <div class="level-btn" id="lvbtn-N5" onclick="setLevel('N5')">
      <span class="lv-name">N5</span>
      <div class="lv-bar-wrap"><div class="lv-bar" id="lvbar-N5" style="width:0%"></div></div>
      <span class="lv-count" id="lvcount-N5">0/0</span>
    </div>
    <div class="level-btn" id="lvbtn-N4" onclick="setLevel('N4')">
      <span class="lv-name">N4</span>
      <div class="lv-bar-wrap"><div class="lv-bar" id="lvbar-N4" style="width:0%"></div></div>
      <span class="lv-count" id="lvcount-N4">0/0</span>
    </div>
    <div class="level-btn" id="lvbtn-N3" onclick="setLevel('N3')">
      <span class="lv-name">N3</span>
      <div class="lv-bar-wrap"><div class="lv-bar" id="lvbar-N3" style="width:0%"></div></div>
      <span class="lv-count" id="lvcount-N3">0/0</span>
    </div>
    <div class="level-btn" id="lvbtn-N2" onclick="setLevel('N2')">
      <span class="lv-name">N2</span>
      <div class="lv-bar-wrap"><div class="lv-bar" id="lvbar-N2" style="width:0%"></div></div>
      <span class="lv-count" id="lvcount-N2">0/0</span>
    </div>
    <div class="level-btn" id="lvbtn-N1" onclick="setLevel('N1')">
      <span class="lv-name">N1</span>
      <div class="lv-bar-wrap"><div class="lv-bar" id="lvbar-N1" style="width:0%"></div></div>
      <span class="lv-count" id="lvcount-N1">0/0</span>
    </div>
  </div>
</div>

<!-- Pool Status -->
<div class="pool-status">
  <div class="pool-row">
    <div class="pool-label" id="pool-level-label">學習池</div>
    <div class="pool-numbers">
      <div class="pool-stat s-pool"><strong id="stat-pool">0</strong>池中</div>
      <div class="pool-stat s-learned"><strong id="stat-learned">0</strong>已學會</div>
      <div class="pool-stat s-remain"><strong id="stat-total">0</strong>總單詞</div>
    </div>
  </div>
  <div class="pool-bar-track">
    <div class="pool-bar-learned" id="bar-learned" style="width:0%"></div>
    <div class="pool-bar-again" id="bar-again" style="width:0%"></div>
    <div class="pool-bar-fresh" id="bar-fresh" style="width:0%"></div>
  </div>
  <div class="pool-list-toggle" onclick="togglePoolList()">▾ 查看池中單詞</div>
  <div class="pool-list" id="pool-list"></div>
</div>

<!-- Filter tabs -->
<div class="filter-tabs">
  <div class="tab active" onclick="setFilter('pool')" id="tab-pool">學習池</div>
  <div class="tab" onclick="setFilter('learned')" id="tab-learned">已學會</div>
  <div class="tab" onclick="setFilter('all')" id="tab-all">全部</div>
</div>

<!-- Card -->
<div class="card-area" id="card-area">
  <div class="card-wrapper" id="card-wrapper" onclick="flipCard()">
    <div class="card-face card-front">
      <div class="status-dot" id="status-dot"></div>
      <div class="new-badge" id="new-badge">NEW</div>
      <div class="card-corner" id="card-corner">—</div>
      <div class="card-level-badge" id="card-level-badge">N5</div>
      <div class="card-category" id="card-category">—</div>
      <div class="card-jp" id="card-jp">—</div>
      <div class="card-flip-hint">點擊翻面</div>
    </div>
    <div class="card-face card-back">
      <div class="card-corner" id="card-corner-back">—</div>
      <div class="card-reading" id="card-reading">—</div>
      <div class="card-meaning" id="card-meaning">—</div>
      <div class="card-romaji" id="card-romaji">—</div>
    </div>
  </div>
</div>

<div class="empty-state" id="empty-state">
  <div class="big" id="empty-icon">✨</div>
  <p id="empty-msg">這輪看完了！</p>
  <button class="empty-refill" id="empty-btn" onclick="handleEmptyBtn()">再來一輪</button>
</div>

<div class="actions" id="actions">
  <button class="action-btn btn-again" onclick="markAgain()">✗ 還沒會</button>
  <button class="action-btn btn-skip" onclick="nextCard()">跳過</button>
  <button class="action-btn btn-learned" onclick="markLearned()">✓ 學會了</button>
</div>

<div class="session-info">
  <div>本輪剩餘 <span id="remain-count">—</span></div>
  <div>本次學會 <span id="session-learned">0</span></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal">
    <h2>⚙ 設定與進度</h2>
    <div class="modal-section">
      <div class="modal-section-label">學習池大小（目前 <span id="pool-size-cur">20</span> 個）</div>
      <div class="slider-row">
        <input type="range" id="pool-size-slider" min="5" max="50" value="20" oninput="updatePoolSizeDisplay(this.value)">
        <div class="slider-val" id="pool-size-display">20</div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">進度備份（目前等級）</div>
      <div class="modal-row">
        <button class="modal-btn" onclick="exportProgress()">📤 匯出 JSON</button>
        <button class="modal-btn" onclick="document.getElementById('import-file').click()">📥 匯入 JSON</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importProgress(event)">
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">重置</div>
      <div class="modal-row">
        <button class="modal-btn danger" onclick="resetCurrentLevel()">🗑 重置此等級進度</button>
        <button class="modal-btn danger" onclick="resetAllLevels()">🗑 重置全部進度</button>
      </div>
    </div>
    <div class="modal-stats" id="modal-stats"></div>
    <button class="modal-close" onclick="closeModal()">套用並關閉</button>
  </div>
</div>

<script>

//  id 前綴必須與等級一致（N5_, N4_, N3_, N2_, N1_）

// ════════════════════════════════════════════════════════════════
//  STORAGE  — 每個等級各自獨立存在 localStorage
// ════════════════════════════════════════════════════════════════
const STORAGE_PREFIX = 'jpvocab_v3_';
const LEVEL_KEY      = 'jpvocab_v3_lastLevel';

function loadLevelState(lv) {
  try {
    const r = localStorage.getItem(STORAGE_PREFIX + lv);
    if (r) return JSON.parse(r);
  } catch(e) {}
  return null;
}

function saveLevelState(lv, data) {
  localStorage.setItem(STORAGE_PREFIX + lv, JSON.stringify(data));
}

function saveLastLevel(lv) {
  localStorage.setItem(LEVEL_KEY, lv);
}

function loadLastLevel() {
  return localStorage.getItem(LEVEL_KEY) || 'N5';
}

// ════════════════════════════════════════════════════════════════
//  RUNTIME STATE
// ════════════════════════════════════════════════════════════════
let currentLevel = 'N5';
let WORDS = [];          // active level's word list
let progress = {};       // id -> 'learned' | 'again' | undefined
let poolIds = [];
let poolSize = 20;
let bag = [];
let currentWord = null;
let isFlipped = false;
let filter = 'pool';
let sessionLearned = 0;
let pendingNewWord = false;

// ════════════════════════════════════════════════════════════════
//  LEVEL SWITCHING
// ════════════════════════════════════════════════════════════════
function setLevel(lv) {
  // Save current state before switching
  saveLevelState(currentLevel, { progress, poolIds, poolSize });
  saveLastLevel(lv);

  currentLevel = lv;
  WORDS = WORD_DB[lv];

  // Load saved state for new level
  const saved = loadLevelState(lv);
  if (saved && saved.poolIds && saved.poolIds.length > 0) {
    progress = saved.progress || {};
    poolIds  = saved.poolIds;
    poolSize = saved.poolSize || 20;
    // Validate: remove ids no longer in WORDS
    const validIds = new Set(WORDS.map(w => w.id));
    poolIds = poolIds.filter(id => validIds.has(id));
    Object.keys(progress).forEach(id => { if (!validIds.has(id)) delete progress[id]; });
    if (poolIds.length === 0) initPool();
  } else if (saved) {
    progress = saved.progress || {};
    poolSize = saved.poolSize || 20;
    const validIds = new Set(WORDS.map(w => w.id));
    Object.keys(progress).forEach(id => { if (!validIds.has(id)) delete progress[id]; });
    initPool();
  } else {
    progress = {};
    poolSize = 20;
    initPool();
  }

  // Update UI
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('lvbtn-' + lv).classList.add('active');
  document.getElementById('pool-level-label').textContent = `學習池 · ${lv}`;
  document.getElementById('card-level-badge').textContent = lv;

  bag = [];
  filter = 'pool';
  sessionLearned = 0;
  document.getElementById('session-learned').textContent = 0;
  ['pool','learned','all'].forEach(k =>
    document.getElementById('tab-'+k).classList.toggle('active', k === filter));

  document.getElementById('pool-list').classList.remove('open');
  updateAllLevelBars();
  updateStatusUI();
  nextCard();
}

// ════════════════════════════════════════════════════════════════
//  POOL LOGIC
// ════════════════════════════════════════════════════════════════
function wordById(id) { return WORDS.find(w => w.id === id); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getUnseenIds() {
  const inPool = new Set(poolIds);
  return WORDS.map(w => w.id).filter(id => !progress[id] && !inPool.has(id));
}

function initPool() {
  const unseen = shuffle(getUnseenIds());
  poolIds = unseen.slice(0, Math.min(poolSize, unseen.length));
}

function replenishPool() {
  if (poolIds.length >= poolSize) return false;
  const unseen = getUnseenIds();
  if (unseen.length === 0) return false;
  const newId = unseen[Math.floor(Math.random() * unseen.length)];
  poolIds.push(newId);
  const insertAt = Math.min(Math.floor(Math.random() * 3), bag.length);
  bag.splice(bag.length - insertAt, 0, newId);
  pendingNewWord = newId;
  return true;
}

// ════════════════════════════════════════════════════════════════
//  BAG
// ════════════════════════════════════════════════════════════════
function getActiveIds() {
  if (filter === 'pool')    return [...poolIds];
  if (filter === 'learned') return WORDS.map(w=>w.id).filter(id => progress[id] === 'learned');
  return WORDS.map(w => w.id);
}

function refillBag() { bag = shuffle(getActiveIds()); }

// ════════════════════════════════════════════════════════════════
//  CARD DISPLAY
// ════════════════════════════════════════════════════════════════
function showCard(id) {
  const word = wordById(id);
  if (!word) { nextCard(); return; }
  currentWord = word;
  isFlipped = false;

  const isNew = (pendingNewWord === id);
  if (isNew) pendingNewWord = false;

  document.getElementById('card-wrapper').classList.remove('flipped');

  const activeIds = getActiveIds();
  const pos = filter === 'pool'
    ? `${poolIds.indexOf(id)+1} / ${poolIds.length}`
    : `${activeIds.indexOf(id)+1} / ${activeIds.length}`;

  document.getElementById('card-corner').textContent = pos;
  document.getElementById('card-corner-back').textContent = pos;
  document.getElementById('card-category').textContent = word.cat;
  document.getElementById('card-jp').textContent = word.jp;
  document.getElementById('card-reading').textContent = word.read;
  document.getElementById('card-meaning').textContent = word.zh;
  document.getElementById('card-romaji').textContent = word.rom;
  document.getElementById('remain-count').textContent = bag.length;

  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + (progress[id] || '');
  document.getElementById('new-badge').className = 'new-badge' + (isNew ? ' show' : '');

  const area = document.getElementById('card-area');
  area.classList.remove('animate');
  void area.offsetWidth;
  area.classList.add('animate');
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-wrapper').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  const active = getActiveIds();
  if (active.length === 0) { showEmpty(); return; }
  if (bag.length === 0) refillBag();
  let id = null;
  while (bag.length > 0) {
    const c = bag.pop();
    if (active.includes(c)) { id = c; break; }
  }
  if (id === null) { refillBag(); if (bag.length === 0) { showEmpty(); return; } id = bag.pop(); }
  document.getElementById('card-area').style.display = '';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('actions').style.display = '';
  showCard(id);
}

function showEmpty() {
  document.getElementById('card-area').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('empty-state').style.display = 'block';
  const unseenLeft = getUnseenIds().length;
  if (filter === 'pool' && poolIds.length === 0 && unseenLeft === 0) {
    document.getElementById('empty-icon').textContent = '🏆';
    document.getElementById('empty-msg').innerHTML = `${currentLevel} 全部單詞都學完了！`;
    document.getElementById('empty-btn').textContent = '從頭複習';
  } else if (filter === 'pool' && poolIds.length === 0) {
    document.getElementById('empty-icon').textContent = '🎉';
    document.getElementById('empty-msg').innerHTML = `學習池空了！還有 ${unseenLeft} 個新單詞。`;
    document.getElementById('empty-btn').textContent = '補充新單詞';
  } else {
    document.getElementById('empty-icon').textContent = '✨';
    document.getElementById('empty-msg').innerHTML = `這輪看完了！池中還有 ${poolIds.length} 個。`;
    document.getElementById('empty-btn').textContent = '再來一輪';
  }
}

function handleEmptyBtn() {
  if (filter === 'pool' && poolIds.length === 0) initPool();
  bag = [];
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('card-area').style.display = '';
  document.getElementById('actions').style.display = '';
  nextCard();
}

// ════════════════════════════════════════════════════════════════
//  MARKING
// ════════════════════════════════════════════════════════════════
function markLearned() {
  if (!currentWord) return;
  const id = currentWord.id;
  progress[id] = 'learned';
  poolIds = poolIds.filter(x => x !== id);
  bag = bag.filter(x => x !== id);
  sessionLearned++;
  document.getElementById('session-learned').textContent = sessionLearned;
  if (filter === 'pool') replenishPool();
  saveLevelState(currentLevel, { progress, poolIds, poolSize });
  updateStatusUI();
  updateAllLevelBars();
  nextCard();
}

function markAgain() {
  if (!currentWord) return;
  progress[currentWord.id] = 'again';
  saveLevelState(currentLevel, { progress, poolIds, poolSize });
  updateStatusUI();
  nextCard();
}

// ════════════════════════════════════════════════════════════════
//  FILTER
// ════════════════════════════════════════════════════════════════
function setFilter(f) {
  filter = f;
  ['pool','learned','all'].forEach(k =>
    document.getElementById('tab-'+k).classList.toggle('active', k === f));
  bag = [];
  sessionLearned = 0;
  document.getElementById('session-learned').textContent = 0;
  nextCard();
}

// ════════════════════════════════════════════════════════════════
//  UI STATUS
// ════════════════════════════════════════════════════════════════
function updateStatusUI() {
  const learnedCount = WORDS.filter(w => progress[w.id] === 'learned').length;
  const againCount   = poolIds.filter(id => progress[id] === 'again').length;
  const freshCount   = poolIds.filter(id => !progress[id]).length;
  const total = WORDS.length;

  document.getElementById('stat-pool').textContent = poolIds.length;
  document.getElementById('stat-learned').textContent = learnedCount;
  document.getElementById('stat-total').textContent = total;

  document.getElementById('bar-learned').style.width = (learnedCount/total*100).toFixed(1)+'%';
  document.getElementById('bar-again').style.width   = (againCount/total*100).toFixed(1)+'%';
  document.getElementById('bar-fresh').style.width   = (freshCount/total*100).toFixed(1)+'%';

  const pl = document.getElementById('pool-list');
  pl.innerHTML = '';
  poolIds.forEach(id => {
    const w = wordById(id); if (!w) return;
    const chip = document.createElement('div');
    chip.className = 'pool-word-chip ' + (progress[id] || '');
    chip.textContent = w.jp;
    pl.appendChild(chip);
  });
}

// Update the mini progress bars in the level selector buttons
function updateAllLevelBars() {
  ['N5','N4','N3','N2','N1'].forEach(lv => {
    const words = WORD_DB[lv];
    let prog = {};
    if (lv === currentLevel) {
      prog = progress;
    } else {
      const saved = loadLevelState(lv);
      if (saved) prog = saved.progress || {};
    }
    const learnedCount = words.filter(w => prog[w.id] === 'learned').length;
    const total = words.length;
    const pct = total > 0 ? (learnedCount / total * 100).toFixed(0) : 0;
    document.getElementById('lvbar-' + lv).style.width = pct + '%';
    document.getElementById('lvcount-' + lv).textContent = `${learnedCount}/${total}`;
  });
}

function togglePoolList() {
  document.getElementById('pool-list').classList.toggle('open');
}

// ════════════════════════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════════════════════════
function updatePoolSizeDisplay(v) {
  document.getElementById('pool-size-display').textContent = v;
}

function openModal() {
  document.getElementById('pool-size-slider').value = poolSize;
  document.getElementById('pool-size-display').textContent = poolSize;
  document.getElementById('pool-size-cur').textContent = poolSize;
  const learnedCount = WORDS.filter(w => progress[w.id] === 'learned').length;
  const againCount   = poolIds.filter(id => progress[id] === 'again').length;
  const freshCount   = poolIds.filter(id => !progress[id]).length;
  document.getElementById('modal-stats').innerHTML =
    `目前等級：<span>${currentLevel}</span><br>` +
    `學習池中：<span>${poolIds.length} 個</span><br>` +
    `　學習中：<span>${againCount} 個</span><br>` +
    `　全新：<span>${freshCount} 個</span><br>` +
    `已學會：<span>${learnedCount} 個</span><br>` +
    `尚未進池：<span>${getUnseenIds().length} 個</span><br>` +
    `總單詞：<span>${WORDS.length} 個</span>`;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  const newSize = parseInt(document.getElementById('pool-size-slider').value);
  if (newSize !== poolSize) {
    poolSize = newSize;
    document.getElementById('pool-size-cur').textContent = poolSize;
    if (poolIds.length < poolSize) {
      const add = shuffle(getUnseenIds()).slice(0, poolSize - poolIds.length);
      poolIds.push(...add);
      bag = [];
    }
    saveLevelState(currentLevel, { progress, poolIds, poolSize });
    updateStatusUI();
  }
  document.getElementById('modal-bg').classList.remove('open');
}

function closeModalBg(e) {
  if (e.target === document.getElementById('modal-bg')) closeModal();
}

function exportProgress() {
  const data = {
    version: 3, level: currentLevel,
    date: new Date().toISOString(),
    progress, poolIds, poolSize
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `jp-vocab-${currentLevel}-progress.json`;
  a.click();
}

function importProgress(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.progress) {
        const lv = data.level || currentLevel;
        saveLevelState(lv, { progress: data.progress, poolIds: data.poolIds || [], poolSize: data.poolSize || 20 });
        if (lv === currentLevel) setLevel(lv);
        else alert(`${lv} 的進度匯入成功！`);
        closeModal();
      }
    } catch(err) { alert('檔案格式錯誤'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function resetCurrentLevel() {
  if (!confirm(`確定要重置 ${currentLevel} 的所有進度嗎？`)) return;
  progress = {}; poolIds = []; sessionLearned = 0;
  document.getElementById('session-learned').textContent = 0;
  initPool(); bag = [];
  saveLevelState(currentLevel, { progress, poolIds, poolSize });
  updateStatusUI(); updateAllLevelBars(); nextCard(); closeModal();
}

function resetAllLevels() {
  if (!confirm('確定要重置所有等級的進度嗎？這無法復原。')) return;
  ['N5','N4','N3','N2','N1'].forEach(lv => localStorage.removeItem(STORAGE_PREFIX + lv));
  progress = {}; poolIds = []; sessionLearned = 0;
  document.getElementById('session-learned').textContent = 0;
  initPool(); bag = [];
  saveLevelState(currentLevel, { progress, poolIds, poolSize });
  updateStatusUI(); updateAllLevelBars(); nextCard(); closeModal();
}

// ════════════════════════════════════════════════════════════════
//  SWIPE
// ════════════════════════════════════════════════════════════════
let tx = 0, ty = 0;
document.getElementById('card-area').addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, {passive:true});
document.getElementById('card-area').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < Math.abs(dy) || Math.abs(dx) < 55) return;
  if (dx > 0) markLearned(); else markAgain();
}, {passive:true});

// ════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════
const lastLevel = loadLastLevel();
// Bootstrap with N5 defaults before setLevel() overrides
currentLevel = lastLevel;
WORDS = WORD_DB[lastLevel];
progress = {};
poolSize = 20;
initPool();
// Now properly load saved state
setLevel(lastLevel);
</script>
