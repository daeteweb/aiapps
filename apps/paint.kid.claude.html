<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小畫家：動物森林</title>
<style>
  :root {
    --sidebar-collapsed: 44px;
    --sidebar-expanded: 260px;
    --bg: #fdf6ee;
    --panel: #2b2b2b;
    --panel-light: #3a3a3a;
    --accent: #ff7043;
    --accent2: #42a5f5;
    --accent3: #66bb6a;
    --text: #fff;
    --text-muted: #aaa;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: "Noto Sans TC", "PingFang TC", "微軟正黑體", sans-serif;
    touch-action: none;
    user-select: none;
  }

  /* ── 整體佈局 ── */
  #app {
    display: flex;
    width: 100%; height: 100%;
  }

  /* ── 側邊欄 ── */
  #sidebar {
    width: var(--sidebar-collapsed);
    height: 100%;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width 0.28s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
    z-index: 200;
    position: relative;
  }
  #sidebar.open { width: var(--sidebar-expanded); }

  /* 漢堡 */
  #hamburger {
    width: var(--sidebar-collapsed);
    height: 50px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: var(--panel-light);
    border-bottom: 1px solid #444;
  }
  #hamburger svg { width: 22px; height: 22px; }

  /* 側邊欄內容 */
  #sidebar-content {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    overflow-y: auto;
    flex: 1;
    padding: 12px 14px 20px;
    min-width: var(--sidebar-expanded);
  }
  #sidebar.open #sidebar-content {
    opacity: 1;
    pointer-events: auto;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin: 16px 0 7px;
  }
  .section-label:first-child { margin-top: 4px; }

  /* 模式按鈕 */
  .mode-btn {
    display: flex; align-items: center; gap: 9px;
    width: 100%; padding: 9px 11px;
    background: #444; color: var(--text);
    border: none; border-radius: 8px;
    cursor: pointer; font-size: 13px;
    margin-bottom: 5px;
    transition: background 0.15s;
  }
  .mode-btn.active { background: var(--accent); }
  .mode-btn:hover:not(.active) { background: #555; }
  .mode-btn .mode-icon { font-size: 18px; line-height: 1; }

  /* 顏色選擇器 */
  #color-row {
    display: flex; align-items: center; gap: 9px; margin-bottom: 6px;
  }
  #colorPicker {
    width: 44px; height: 34px; border: none; border-radius: 6px;
    cursor: pointer; padding: 2px; background: #444;
  }
  #rainbow-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text); cursor: pointer;
  }
  #rainbowToggle { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

  /* 動物格子 */
  #animal-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }
  .animal-btn {
    background: #444; border: 2px solid transparent;
    border-radius: 8px; cursor: pointer;
    padding: 5px 4px 4px;
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    transition: border-color 0.15s, background 0.15s;
  }
  .animal-btn:hover { background: #555; }
  .animal-btn.active { border-color: var(--accent2); }
  .animal-btn .a-icon { font-size: 22px; line-height: 1.1; }
  .animal-btn .a-name { font-size: 10px; color: var(--text-muted); }

  /* 工具按鈕 */
  .tool-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 9px 11px;
    border: none; border-radius: 8px;
    cursor: pointer; font-size: 13px;
    margin-bottom: 5px; color: var(--text);
    transition: background 0.15s;
  }
  #saveBtn   { background: var(--accent3); }
  #clearBtn  { background: #c0392b; }
  #saveBtn:hover  { background: #57a85b; }
  #clearBtn:hover { background: #a93226; }

  /* 進度 */
  #progress-wrap {
    background: #444; border-radius: 8px; padding: 10px 11px;
    margin-bottom: 6px;
  }
  #progress-label {
    font-size: 11px; color: var(--text-muted); margin-bottom: 5px;
  }
  #progress-bar-track {
    width: 100%; height: 8px; background: #666; border-radius: 4px; overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%; width: 0%; background: var(--accent);
    border-radius: 4px; transition: width 0.4s ease;
  }
  #progress-pct {
    font-size: 20px; font-weight: bold; color: var(--text);
    text-align: right; margin-top: 4px;
  }

  /* 藝廊 */
  #gallery-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 6px;
  }
  .gallery-thumb {
    width: 100%; aspect-ratio: 4/3;
    object-fit: cover; border-radius: 5px;
    border: 1px solid #555; background: #fff;
  }

  /* ── 主畫布區 ── */
  #main {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #fff;
  }

  /* 三層 Canvas */
  #main canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #calcCanvas { display: none; }

  /* 頂部進度條（折疊時可見） */
  #top-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 4px; z-index: 10;
    pointer-events: none;
  }
  #top-bar-fill {
    height: 100%; width: 0%; background: var(--accent);
    transition: width 0.4s ease;
  }

  /* 完成 badge */
  #done-badge {
    position: absolute; top: 14px; right: 14px;
    background: var(--accent3); color: #fff;
    font-size: 14px; padding: 7px 14px;
    border-radius: 20px; opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
    z-index: 20;
  }
  #done-badge.show { opacity: 1; }

  /* 模式提示標籤 */
  #mode-hint {
    position: absolute; bottom: 14px; right: 14px;
    background: rgba(0,0,0,0.45); color: #fff;
    font-size: 12px; padding: 5px 12px;
    border-radius: 12px; pointer-events: none;
    z-index: 20;
    backdrop-filter: blur(4px);
  }
</style>
</head>
<body>
<div id="app">

  <!-- ── 側邊欄 ── -->
  <div id="sidebar">
    <div id="hamburger" title="選單">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </div>

    <div id="sidebar-content">

      <div class="section-label">遊戲模式</div>
      <button class="mode-btn active" data-mode="free">
        <span class="mode-icon">🎨</span> 自由填滿
      </button>
      <button class="mode-btn" data-mode="color">
        <span class="mode-icon">✏️</span> 著色挑戰
      </button>
      <button class="mode-btn" data-mode="scratch">
        <span class="mode-icon">🔍</span> 神秘刮刮樂
      </button>

      <div class="section-label">畫筆顏色</div>
      <div id="color-row">
        <input type="color" id="colorPicker" value="#ff7043">
        <label id="rainbow-label">
          <input type="checkbox" id="rainbowToggle"> 彩虹模式
        </label>
      </div>

      <div class="section-label">選擇動物</div>
      <div id="animal-grid"></div>

      <div class="section-label">完成度</div>
      <div id="progress-wrap">
        <div id="progress-label">已填滿</div>
        <div id="progress-bar-track">
          <div id="progress-bar-fill"></div>
        </div>
        <div id="progress-pct">0%</div>
      </div>

      <div class="section-label">作品工具</div>
      <button class="tool-btn" id="saveBtn">💾 儲存成品</button>
      <button class="tool-btn" id="clearBtn">🗑️ 重新開始</button>

      <div class="section-label">我的作品</div>
      <div id="gallery-grid"></div>

    </div>
  </div>

  <!-- ── 畫布 ── -->
  <div id="main">
    <div id="top-bar"><div id="top-bar-fill"></div></div>
    <canvas id="bgCanvas"></canvas>
    <canvas id="paintCanvas"></canvas>
    <canvas id="calcCanvas"></canvas>
    <div id="done-badge">🎉 完成！</div>
    <div id="mode-hint">自由填滿</div>
  </div>

</div>

  { id: 'turtle',  name: '烏龜', icon: '🐢' },
];

const MODES = {
  free:    '🎨 自由填滿',
  color:   '✏️ 著色挑戰',
  scratch: '🔍 神秘刮刮樂',
};

// ============================
// 狀態
// ============================
let mode          = 'free';
let currentAnimal = 'shiba';
let isDrawing     = false;
let hue           = 0;
let isCompleted   = false;
let lastX = 0, lastY = 0;

// ============================
// DOM
// ============================
const sidebar     = document.getElementById('sidebar');
const hamburger   = document.getElementById('hamburger');
const bgCanvas    = document.getElementById('bgCanvas');
const paintCanvas = document.getElementById('paintCanvas');
const calcCanvas  = document.getElementById('calcCanvas');
const bgCtx       = bgCanvas.getContext('2d');
const paintCtx    = paintCanvas.getContext('2d', { willReadFrequently: true });
const calcCtx     = calcCanvas.getContext('2d', { willReadFrequently: true });
const modeHint    = document.getElementById('mode-hint');
const doneBadge   = document.getElementById('done-badge');
const progressFill = document.getElementById('progress-bar-fill');
const progressPct  = document.getElementById('progress-pct');
const topBarFill   = document.getElementById('top-bar-fill');

// ============================
// 漢堡開關
// ============================
hamburger.addEventListener('click', () => sidebar.classList.toggle('open'));

// 點畫布時關閉側邊欄（iPad友善）
paintCanvas.addEventListener('pointerdown', () => {
  if (sidebar.classList.contains('open')) sidebar.classList.remove('open');
}, { passive: true });

// ============================
// 初始化動物格子
// ============================
const animalGrid = document.getElementById('animal-grid');
ANIMALS.forEach(a => {
  const btn = document.createElement('button');
  btn.className = 'animal-btn' + (a.id === currentAnimal ? ' active' : '');
  btn.dataset.id = a.id;
  btn.innerHTML = `<span class="a-icon">${a.icon}</span><span class="a-name">${a.name}</span>`;
  btn.addEventListener('click', () => selectAnimal(a.id));
  animalGrid.appendChild(btn);
});

function selectAnimal(id) {
  currentAnimal = id;
  document.querySelectorAll('.animal-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.id === id));
  resetCanvas();
}

// ============================
// 模式切換
// ============================
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === mode));
    modeHint.textContent = MODES[mode];
    resetCanvas();
  });
});

// ============================
// 畫布尺寸
// ============================
const CALC_W = 120;
let calcH = 90;

function resizeCanvases() {
  const w = paintCanvas.parentElement.clientWidth;
  const h = paintCanvas.parentElement.clientHeight;
  bgCanvas.width  = paintCanvas.width  = w;
  bgCanvas.height = paintCanvas.height = h;
  calcH = Math.round(CALC_W * h / w);
  calcCanvas.width  = CALC_W;
  calcCanvas.height = calcH;
  drawBackground();
}

window.addEventListener('resize', () => { resizeCanvases(); });
resizeCanvases();

// ============================
// SVG → Canvas 渲染
// ============================
function getSVGDataURL(animalId, showColors) {
  const tpl = document.getElementById('tpl-' + animalId);
  if (!tpl) return null;
  const clone = tpl.content.cloneNode(true);
  const svg = clone.querySelector('svg');

  // 控制顯示層
  const colorsGroup = svg.querySelector('.colors');
  const outlineGroup = svg.querySelector('.outline');

  if (colorsGroup)  colorsGroup.style.display = showColors ? '' : 'none';
  if (outlineGroup) outlineGroup.style.display = '';

  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svg);
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
}

function drawSVGToCanvas(ctx, animalId, showColors, callback) {
  const url = getSVGDataURL(animalId, showColors);
  if (!url) { callback && callback(); return; }
  const img = new Image();
  img.onload = () => {
    const cw = ctx.canvas.width;
    const ch = ctx.canvas.height;
    const size = Math.min(cw, ch) * 0.85;
    const x = (cw - size) / 2;
    const y = (ch - size) / 2;
    ctx.drawImage(img, x, y, size, size);
    callback && callback();
  };
  img.src = url;
}

// ============================
// 重置 / 切換畫布
// ============================
function resetCanvas() {
  isCompleted = false;
  doneBadge.classList.remove('show');
  paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  setProgress(0);
  drawBackground();
}

function drawBackground() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  bgCtx.fillStyle = '#ffffff';
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

  if (mode === 'free') {
    // 純白，不需要動物
    return;
  }

  if (mode === 'color') {
    // 只顯示外框（黑白）
    drawSVGToCanvas(bgCtx, currentAnimal, false);
  }

  if (mode === 'scratch') {
    // 底層：彩色動物
    drawSVGToCanvas(bgCtx, currentAnimal, true, () => {
      // 頂層 paintCanvas：灰色遮罩
      paintCtx.fillStyle = '#c8c8c8';
      paintCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
    });
  }
}

// ============================
// 繪圖
// ============================
function getColor() {
  if (document.getElementById('rainbowToggle').checked) {
    hue = (hue + 1.5) % 360;
    return `hsl(${hue}, 85%, 58%)`;
  }
  return document.getElementById('colorPicker').value;
}

function getPos(e) {
  const rect = paintCanvas.getBoundingClientRect();
  const scaleX = paintCanvas.width / rect.width;
  const scaleY = paintCanvas.height / rect.height;
  let cx, cy;
  if (e.touches && e.touches.length > 0) {
    cx = e.touches[0].clientX; cy = e.touches[0].clientY;
  } else {
    cx = e.clientX; cy = e.clientY;
  }
  return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
}

function startDraw(e) {
  e.preventDefault();
  isDrawing = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
  paintCtx.beginPath();
  paintCtx.moveTo(lastX, lastY);
}

function doDraw(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const p = getPos(e);

  paintCtx.lineWidth  = 44;
  paintCtx.lineCap    = 'round';
  paintCtx.lineJoin   = 'round';

  if (mode === 'scratch') {
    paintCtx.globalCompositeOperation = 'destination-out';
    paintCtx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    paintCtx.globalCompositeOperation = 'source-over';
    paintCtx.strokeStyle = getColor();
  }

  paintCtx.lineTo(p.x, p.y);
  paintCtx.stroke();
  paintCtx.beginPath();
  paintCtx.moveTo(p.x, p.y);
  lastX = p.x; lastY = p.y;
}

function endDraw(e) {
  isDrawing = false;
  paintCtx.beginPath();
}

// 事件綁定
paintCanvas.addEventListener('mousedown',  startDraw, { passive: false });
paintCanvas.addEventListener('mousemove',  doDraw,    { passive: false });
window.addEventListener('mouseup',         endDraw);
paintCanvas.addEventListener('touchstart', startDraw, { passive: false });
paintCanvas.addEventListener('touchmove',  doDraw,    { passive: false });
paintCanvas.addEventListener('touchend',   endDraw,   { passive: false });

// ============================
// 進度計算（每 3 秒）
// ============================
function calcProgress() {
  calcCtx.clearRect(0, 0, CALC_W, calcH);
  calcCtx.drawImage(paintCanvas, 0, 0, CALC_W, calcH);

  const data = calcCtx.getImageData(0, 0, CALC_W, calcH).data;
  let filled = 0;
  const total = CALC_W * calcH;

  if (mode === 'scratch') {
    // 刮刮樂：計算「已擦去的像素」（alpha = 0）
    for (let i = 3; i < data.length; i += 4) {
      if (data[i] < 10) filled++;
    }
  } else {
    // 其他模式：計算「有顏色的像素」（alpha > 0）
    for (let i = 3; i < data.length; i += 4) {
      if (data[i] > 10) filled++;
    }
  }

  const pct = Math.round((filled / total) * 100);
  setProgress(pct);

  if (pct >= 95 && !isCompleted) {
    isCompleted = true;
    doneBadge.classList.add('show');
    setTimeout(() => doneBadge.classList.remove('show'), 3500);
  }
}

function setProgress(pct) {
  const p = Math.min(pct, 100);
  progressFill.style.width = p + '%';
  progressPct.textContent  = p + '%';
  topBarFill.style.width   = p + '%';
}

setInterval(calcProgress, 3000);

// ============================
// 儲存作品
// ============================
document.getElementById('saveBtn').addEventListener('click', () => {
  // 合併 bg + paint 輸出
  const merge = document.createElement('canvas');
  merge.width  = bgCanvas.width;
  merge.height = bgCanvas.height;
  const mCtx = merge.getContext('2d');
  mCtx.fillStyle = '#fff';
  mCtx.fillRect(0, 0, merge.width, merge.height);
  mCtx.drawImage(bgCanvas, 0, 0);
  mCtx.drawImage(paintCanvas, 0, 0);

  const dataUrl = merge.toDataURL('image/jpeg', 0.85);

  // 存入 LocalStorage
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('kp_gallery') || '[]'); } catch(e){}
  saved.unshift(dataUrl);
  if (saved.length > 12) saved = saved.slice(0, 12); // 最多 12 張
  try { localStorage.setItem('kp_gallery', JSON.stringify(saved)); } catch(e){}

  renderGallery();
});

// ============================
// 藝廊
// ============================
function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '';
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem('kp_gallery') || '[]'); } catch(e){}
  saved.forEach(url => {
    const img = document.createElement('img');
    img.className = 'gallery-thumb';
    img.src = url;
    grid.appendChild(img);
  });
}
renderGallery();

// ============================
// 清除
// ============================
document.getElementById('clearBtn').addEventListener('click', resetCanvas);

</script>
</body>
</html>
