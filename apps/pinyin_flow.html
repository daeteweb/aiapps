<!DOCTYPE html>
<html lang="zh-TW">
<head>
<!--
================================================================================
  拼音流 (Pinyin Flow) - 漢語拼音練習工具
  Generated by: Claude Sonnet (Anthropic)
  設計討論紀錄版本: v1.0
================================================================================
 
【專案設計規格總結】
 
▌ 視覺規範
  - 背景: 純黑 (#000)
  - 焦點字 (當前): 純白色，放大顯示
  - 待輸入字: 淺灰色，縮小預覽（右側）
  - 已輸入字: 退後縮小（左側），帶紅/綠回饋
  - 上方拼音: 預設暗灰（隱形助教），輸入正確後轉金色
  - 文字流: 傳送帶模式（已打←焦點→待打）
 
▌ 輸入邏輯
  - 全拼匹配，v 代替 ü（例：女=nv）
  - 多音字：匹配任一合法讀音即算正確
  - 即時自動匹配，無需按空格或 Enter
  - 錯誤：字變紅 + 低音咚，輸入框清空，重新輸入
 
▌ 練習模式
  1. 一般循環模式: 選一首詩，打完自動回第一字，無限循環，不紀錄 WPM
  2. 隨機亂序模式: 從字庫打散抽字，練習不熟悉組合，不紀錄 WPM
  3. 自定義模式:   手動貼上文章，即時轉練習，不紀錄 WPM
  4. 挑戰模式:     限時 3 分鐘，WPM + 正確率寫入 IndexedDB
 
▌ 音效系統
  - 使用 Web AudioContext 合成（無需外部 MP3）
  - 正確: 高音叮（約 880Hz）
  - 錯誤: 低音咚（約 220Hz）
 
▌ 資料儲存
  - IndexedDB 資料庫名: PinyinFlowDB
  - 僅挑戰模式紀錄分數
  - 欄位: timestamp, wpm, accuracy, mode
 
▌ 技術規格
  - 單一 HTML 檔案
  - 拼音資料: 使用 pinyin-pro CDN（需連網）
    - 支援繁體字直接查詢（pinyin-pro 內建繁體支援）
    - 聲調數字去除，輸出純英文字母
    - ü 自動轉換為 v（符合輸入法習慣）
    - 多音字回傳所有讀音陣列
  - 詩詞資料: 內建《唐詩三百首》精選（約 100 首）
  - CDN 主: https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.2/dist/index.js
  - CDN 備: https://unpkg.com/pinyin-pro@3.18.2/dist/index.js
  - PWA 友善 Meta 標籤
 
▌ 署名
  - 右下角浮水印: "Generated by Claude"
================================================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>拼音流 Pinyin Flow</title>
<!-- 主 CDN: jsDelivr，備用: unpkg -->
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.2/dist/index.js"
  onerror="loadFallbackCDN()"></script>
<script>
function loadFallbackCDN() {
  var s = document.createElement('script');
  s.src = 'https://unpkg.com/pinyin-pro@3.18.2/dist/index.js';
  s.onerror = function() {
    document.getElementById('load-error') &&
      (document.getElementById('load-error').style.display = 'block');
    document.querySelector('#loading-overlay div') &&
      (document.querySelector('#loading-overlay div').textContent = '載入失敗');
  };
  document.head.appendChild(s);
}
</script>
<style>
  :root {
    --bg: #000;
    --white: #fff;
    --gold: #c9a84c;
    --gray-light: #aaa;
    --gray-dim: #555;
    --gray-dark: #333;
    --green: #4caf78;
    --red: #e05252;
    --font-main: 'Noto Serif TC', 'SimSun', serif;
    --font-mono: 'Courier New', monospace;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }
 
  /* ── HUD ── */
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid #1a1a1a;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--gray-dim);
    min-height: 40px;
    flex-shrink: 0;
  }
  #hud span { min-width: 80px; text-align: center; }
  #hud .mode-tag {
    color: var(--gold);
    border: 1px solid #3a2f1a;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    letter-spacing: 1px;
  }
  #timer-display { color: var(--white); font-size: 15px; font-weight: bold; }
  #wpm-display { color: var(--gold); }
  #stats-display { color: var(--gray-dim); font-size: 11px; }
 
  /* ── 主舞台 ── */
  #stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
  }
 
  /* ── 傳送帶 ── */
  #conveyor {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 700px;
    height: 140px;
    position: relative;
    margin-bottom: 30px;
  }
 
  .char-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
 
  .char-block .pinyin-row {
    font-size: 11px;
    color: var(--gray-dark);
    height: 16px;
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }
  .char-block .char-row {
    font-size: 28px;
    color: var(--gray-dim);
    transition: all 0.2s;
    line-height: 1.2;
  }
  .char-block .input-row { height: 20px; }
 
  /* 焦點字 */
  .char-block.focus .pinyin-row { color: var(--gray-dim); font-size: 13px; }
  .char-block.focus .char-row {
    font-size: 72px;
    color: var(--white);
    text-shadow: 0 0 30px rgba(255,255,255,0.15);
  }
 
  /* 已輸入 */
  .char-block.done-correct .pinyin-row { color: var(--gold); }
  .char-block.done-correct .char-row { color: var(--green); font-size: 22px; }
  .char-block.done-error .pinyin-row { color: var(--red); }
  .char-block.done-error .char-row { color: var(--red); font-size: 22px; }
 
  /* 待輸入 */
  .char-block.pending .char-row { color: #444; font-size: 26px; }
  .char-block.pending .pinyin-row { color: transparent; }
 
  /* 左邊區 */
  #left-zone {
    display: flex;
    align-items: center;
    gap: 8px;
    position: absolute;
    right: calc(50% + 60px);
    top: 0; bottom: 0;
    overflow: hidden;
    justify-content: flex-end;
    width: 260px;
  }
 
  /* 右邊區 */
  #right-zone {
    display: flex;
    align-items: center;
    gap: 8px;
    position: absolute;
    left: calc(50% + 60px);
    top: 0; bottom: 0;
    overflow: hidden;
    justify-content: flex-start;
    width: 260px;
  }
 
  /* 焦點區 */
  #focus-zone {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 120px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 0; bottom: 0;
  }
 
  /* ── 輸入框 ── */
  #input-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
 
  #pinyin-input {
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--gray-dark);
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 22px;
    text-align: center;
    width: 180px;
    padding: 6px 0;
    outline: none;
    transition: border-color 0.2s;
    caret-color: var(--gold);
    letter-spacing: 3px;
  }
  #pinyin-input:focus { border-bottom-color: var(--gold); }
  #pinyin-input.error { border-bottom-color: var(--red); }
 
  #input-hint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--gray-dark);
    letter-spacing: 1px;
  }
 
  /* ── 選單畫面 ── */
  #menu-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 30px;
    overflow-y: auto;
  }
 
  .menu-title {
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  .menu-sub {
    font-size: 12px;
    color: var(--gray-dim);
    letter-spacing: 6px;
    margin-bottom: 40px;
    font-family: var(--font-mono);
  }
 
  .menu-section {
    width: 100%;
    max-width: 420px;
    margin-bottom: 24px;
  }
  .menu-section-label {
    font-size: 11px;
    color: var(--gray-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: var(--font-mono);
  }
 
  .menu-btn {
    width: 100%;
    padding: 14px 20px;
    background: transparent;
    border: 1px solid #2a2a2a;
    color: var(--gray-light);
    font-family: var(--font-main);
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 8px;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 2px;
  }
  .menu-btn:hover { border-color: var(--gold); color: var(--white); background: #0d0d0d; }
  .menu-btn.active { border-color: var(--gold); color: var(--gold); background: #0a0800; }
  .menu-btn .badge {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--gray-dim);
    letter-spacing: 1px;
  }
 
  .menu-start-btn {
    width: 100%;
    max-width: 420px;
    padding: 16px;
    background: var(--gold);
    border: none;
    color: #000;
    font-family: var(--font-main);
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 3px;
    margin-top: 10px;
    transition: opacity 0.15s;
    border-radius: 2px;
  }
  .menu-start-btn:hover { opacity: 0.85; }
 
  .menu-stats-btn {
    width: 100%;
    max-width: 420px;
    padding: 10px;
    background: transparent;
    border: 1px solid #222;
    color: var(--gray-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 2px;
    margin-top: 8px;
    transition: all 0.15s;
    border-radius: 2px;
  }
  .menu-stats-btn:hover { border-color: #444; color: var(--gray-light); }
 
  /* 自定義文字框 */
  #custom-text-area {
    width: 100%;
    max-width: 420px;
    background: #080808;
    border: 1px solid #2a2a2a;
    color: var(--gray-light);
    font-family: var(--font-main);
    font-size: 14px;
    padding: 12px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    margin-top: 8px;
    display: none;
    border-radius: 2px;
  }
  #custom-text-area:focus { border-color: var(--gold); }
 
  /* ── 統計畫面 ── */
  #stats-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    z-index: 100;
    overflow-y: auto;
  }
 
  .stats-title {
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 30px;
  }
 
  #stats-table {
    width: 100%;
    max-width: 500px;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 13px;
  }
  #stats-table th {
    color: var(--gray-dim);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #1a1a1a;
    letter-spacing: 1px;
    font-weight: normal;
  }
  #stats-table td {
    color: var(--gray-light);
    padding: 10px 12px;
    border-bottom: 1px solid #111;
  }
  #stats-table tr:last-child td { border-bottom: none; }
  #stats-table .wpm-cell { color: var(--gold); font-size: 16px; }
  #stats-table .acc-cell { color: var(--green); }
 
  /* 迷你長條圖 */
  #wpm-chart {
    width: 100%;
    max-width: 500px;
    height: 80px;
    margin: 20px 0;
    display: flex;
    align-items: flex-end;
    gap: 4px;
  }
  .bar {
    flex: 1;
    background: var(--gold);
    opacity: 0.6;
    border-radius: 2px 2px 0 0;
    min-height: 4px;
    transition: opacity 0.2s;
  }
  .bar:hover { opacity: 1; }
 
  .stats-back-btn {
    margin-top: 30px;
    padding: 12px 40px;
    background: transparent;
    border: 1px solid #2a2a2a;
    color: var(--gray-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.15s;
    border-radius: 2px;
  }
  .stats-back-btn:hover { border-color: var(--gold); color: var(--gold); }
 
  /* ── 結果畫面 ── */
  #result-screen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
 
  .result-title {
    font-size: 14px;
    color: var(--gray-dim);
    letter-spacing: 4px;
    font-family: var(--font-mono);
    margin-bottom: 20px;
  }
  .result-wpm {
    font-size: 80px;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-wpm-label {
    font-size: 12px;
    color: var(--gray-dim);
    letter-spacing: 4px;
    font-family: var(--font-mono);
    margin-bottom: 30px;
  }
  .result-acc {
    font-size: 20px;
    color: var(--green);
    margin-bottom: 40px;
    font-family: var(--font-mono);
  }
 
  .result-btn {
    padding: 12px 40px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: var(--font-main);
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 3px;
    transition: all 0.15s;
    margin: 5px;
    border-radius: 2px;
  }
  .result-btn:hover { background: var(--gold); color: #000; }
 
  /* ── 進度條 ── */
  #progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    background: var(--gold);
    transition: width 0.3s;
    opacity: 0.6;
  }
 
  /* ── 署名 ── */
  #watermark {
    position: fixed;
    bottom: 12px;
    right: 15px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: #222;
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 10;
  }
 
  /* 動畫 */
  @keyframes flash-error {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .flash-error { animation: flash-error 0.3s ease; }
 
  @keyframes pop-in {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
 
  /* 空白字元（標點/空格）樣式 */
  .char-block.skip .char-row { color: #222; font-size: 22px; }
 
  /* 手機調整 */
  @media (max-width: 480px) {
    .char-block.focus .char-row { font-size: 56px; }
    #left-zone, #right-zone { width: 180px; }
    #left-zone { right: calc(50% + 45px); }
    #right-zone { left: calc(50% + 45px); }
  }
 
  /* 詩詞選擇器 */
  #poem-select {
    width: 100%;
    max-width: 420px;
    background: #080808;
    border: 1px solid #2a2a2a;
    color: var(--gray-light);
    font-family: var(--font-main);
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    margin-top: 8px;
    display: none;
    border-radius: 2px;
    cursor: pointer;
  }
  #poem-select:focus { border-color: var(--gold); }
  #poem-select option { background: #111; }
</style>
</head>
<body>
 
<!-- 進度條 -->
<div id="progress-bar" style="width:0%"></div>
 
<!-- 主介面 -->
<div id="hud">
  <span id="mode-hud" class="mode-tag">練習</span>
  <span id="timer-display">∞</span>
  <span id="wpm-display">-- WPM</span>
  <span id="stats-display">✓ 0  ✗ 0</span>
</div>
 
<div id="stage">
  <div id="conveyor">
    <div id="left-zone"></div>
    <div id="focus-zone"></div>
    <div id="right-zone"></div>
  </div>
  <div id="input-area">
    <input type="text" id="pinyin-input"
      autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false"
      inputmode="text" placeholder="—">
    <div id="input-hint">輸入拼音</div>
  </div>
</div>
 
<!-- 載入中遮罩 -->
<div id="loading-overlay" style="
  position:fixed;inset:0;background:#000;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
  <div style="color:#c9a84c;font-family:monospace;font-size:13px;letter-spacing:3px;">載入拼音資料庫…</div>
  <div id="load-error" style="color:#e05252;font-size:12px;font-family:monospace;display:none;">
    ⚠ 無法連接網路，請確認網路後重新整理
  </div>
</div>
 
<!-- 選單畫面 -->
<div id="menu-screen">
  <div class="menu-title">拼音流</div>
  <div class="menu-sub">PINYIN FLOW</div>
 
  <div class="menu-section">
    <div class="menu-section-label">練習模式</div>
    <button class="menu-btn active" id="mode-loop" onclick="selectMode('loop')">
      <span>詩詞循環</span><span class="badge">無限練習</span>
    </button>
    <button class="menu-btn" id="mode-random" onclick="selectMode('random')">
      <span>亂序字庫</span><span class="badge">隨機抽字</span>
    </button>
    <button class="menu-btn" id="mode-custom" onclick="selectMode('custom')">
      <span>自定義文章</span><span class="badge">貼上練習</span>
    </button>
    <button class="menu-btn" id="mode-challenge" onclick="selectMode('challenge')">
      <span>⚡ 挑戰模式</span><span class="badge">3分鐘計時</span>
    </button>
  </div>
 
  <!-- 詩詞選擇 -->
  <select id="poem-select">
    <option value="random">隨機選詩</option>
  </select>
 
  <!-- 自定義輸入 -->
  <textarea id="custom-text-area" placeholder="貼上想練習的文章或文字…（只會保留漢字）"></textarea>
 
  <button class="menu-start-btn" onclick="startPractice()">開始練習</button>
  <button class="menu-stats-btn" onclick="showStats()">▸ 歷史成績</button>
</div>
 
<!-- 統計畫面 -->
<div id="stats-screen">
  <div class="stats-title">歷史成績</div>
  <div id="wpm-chart"></div>
  <table id="stats-table">
    <thead>
      <tr>
        <th>日期時間</th>
        <th>模式</th>
        <th>WPM</th>
        <th>正確率</th>
      </tr>
    </thead>
    <tbody id="stats-tbody"></tbody>
  </table>
  <button class="stats-back-btn" onclick="hideStats()">返回</button>
</div>
 
<!-- 結果畫面 -->
<div id="result-screen">
  <div class="result-title">挑戰結束</div>
  <div class="result-wpm" id="result-wpm-val">0</div>
  <div class="result-wpm-label">WPM</div>
  <div class="result-acc" id="result-acc-val">正確率 --</div>
  <div>
    <button class="result-btn" onclick="restartChallenge()">再挑戰</button>
    <button class="result-btn" onclick="goMenu()">返回選單</button>
  </div>
</div>
 
<!-- 署名 -->
<div id="watermark">Generated by Claude</div>
 
<script>
// ============================================================
//  拼音轉換 — 使用 pinyin-pro CDN
//  支援繁體字、多音字、聲調去除、ü→v
// ============================================================
 
// 執行期拼音快取（避免重複查詢）
const _pinyinCache = {};
 
/**
 * 將單一漢字轉為拼音陣列（去聲調、ü→v、去重）
 * 需要 pinyin-pro 已載入（window.pinyinPro）
 */
function getPinyin(char) {
  if (_pinyinCache[char]) return _pinyinCache[char];
 
  if (typeof pinyinPro === 'undefined') return null;
 
  try {
    // pinyin-pro v3: pinyin(str, options) 回傳字串
    // multiple:true 讓單字回傳所有讀音，以空格分隔
    const result = pinyinPro.pinyin(char, {
      toneType: 'none',
      multiple: true,
    });
 
    // result 是如 "zhong chong" 的字串
    let pinyins = (typeof result === 'string' ? result : String(result))
      .split(/\s+/).filter(Boolean);
 
    // 正規化去聲調符號（保險）
    pinyins = pinyins.map(p =>
      p.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim()
    );
 
    // ü → v
    pinyins = pinyins.map(p => p.replace(/ü/g, 'v').replace(/u:/g, 'v'));
 
    // 去重、去空
    pinyins = [...new Set(pinyins)].filter(Boolean);
 
    if (pinyins.length === 0) return null;
    _pinyinCache[char] = pinyins;
    return pinyins;
  } catch(e) {
    return null;
  }
}

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSound(freq, type, dur) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
const playCorrect = () => { playSound(880, 'sine', 0.12); setTimeout(()=>playSound(1100,'sine',0.08),60); };
const playError   = () => { playSound(200, 'sawtooth', 0.18); };
 
// ============================================================
//  IndexedDB
// ============================================================
let db = null;
function initDB() {
  return new Promise((res) => {
    const req = indexedDB.open('PinyinFlowDB', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('records')) {
        const store = d.createObjectStore('records', { autoIncrement: true });
        store.createIndex('timestamp','timestamp',{unique:false});
      }
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = () => res();
  });
}
function saveRecord(rec) {
  if (!db) return;
  const tx = db.transaction('records','readwrite');
  tx.objectStore('records').add(rec);
}
function getAllRecords() {
  return new Promise((res) => {
    if (!db) return res([]);
    const tx = db.transaction('records','readonly');
    const req = tx.objectStore('records').getAll();
    req.onsuccess = e => res(e.target.result || []);
    req.onerror = () => res([]);
  });
}

// ============================================================
function prepareText(text) {
  return [...text].filter(c => {
    // 只保留中文字元
    const code = c.charCodeAt(0);
    return (code >= 0x4E00 && code <= 0x9FFF) ||
           (code >= 0x3400 && code <= 0x4DBF) ||
           (code >= 0xF900 && code <= 0xFAFF);
  }).map(char => ({
    char,
    pinyins: getPinyin(char),
    status: 'pending'
  }));
}
 
function preparePoemText(poemIndex) {
  const poem = (poemIndex === 'random' || poemIndex === undefined)
    ? POEMS[Math.floor(Math.random()*POEMS.length)]
    : POEMS[parseInt(poemIndex)];
  return prepareText(poem);
}
 
function prepareRandomText(count) {
  // 從所有詩詞取出不重複漢字作為字庫
  const allCharsRaw = POEMS.join('');
  const allHan = [...new Set([...allCharsRaw].filter(c => {
    const code = c.charCodeAt(0);
    return (code >= 0x4E00 && code <= 0x9FFF) ||
           (code >= 0x3400 && code <= 0x4DBF) ||
           (code >= 0xF900 && code <= 0xFAFF);
  }))];
  const result = [];
  for (let i = 0; i < count; i++) {
    result.push(allHan[Math.floor(Math.random()*allHan.length)]);
  }
  return result.map(char => ({ char, pinyins: getPinyin(char), status:'pending' }));
}
 
// ============================================================
//  開始練習
// ============================================================
function startPractice() {
  const poemSel = document.getElementById('poem-select').value;
 
  if (currentMode === 'loop') {
    chars = preparePoemText(poemSel);
  } else if (currentMode === 'random' || currentMode === 'challenge') {
    chars = prepareRandomText(200);
  } else if (currentMode === 'custom') {
    const txt = document.getElementById('custom-text-area').value.trim();
    if (!txt) { alert('請先貼上文章'); return; }
    chars = prepareText(txt);
    if (chars.length === 0) { alert('未找到可練習的漢字'); return; }
  }
 
  if (chars.length === 0) { alert('準備文字失敗'); return; }
 
  cursor = 0; correctCount = 0; errorCount = 0; startTime = null; hasError = false;
  chars.forEach(c => c.status = 'pending');
 
  document.getElementById('menu-screen').style.display = 'none';
 
  const modeLabels = { loop:'循環', random:'亂序', custom:'自定義', challenge:'⚡挑戰' };
  document.getElementById('mode-hud').textContent = modeLabels[currentMode] || currentMode;
 
  if (currentMode === 'challenge') {
    timerLeft = challengeSeconds;
    document.getElementById('timer-display').textContent = formatTime(timerLeft);
    timerInterval = setInterval(tickTimer, 1000);
  } else {
    document.getElementById('timer-display').textContent = '∞';
  }
 
  running = true;
  render();
  setTimeout(() => document.getElementById('pinyin-input').focus(), 100);
}
 
function formatTime(s) {
  return Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0');
}
 
function tickTimer() {
  timerLeft--;
  document.getElementById('timer-display').textContent = formatTime(timerLeft);
  if (timerLeft <= 0) endChallenge();
}

  const rightZone = document.getElementById('right-zone');

  focusZone.innerHTML = '';
  rightZone.innerHTML = '';

    focusZone.appendChild(makeBlock(cursor, 'focus'));
  }
 
  // 左邊最多4個
  const leftStart = Math.max(0, cursor - 4);
  const leftItems = [];
  for (let i = leftStart; i < cursor; i++) leftItems.push(i);
  leftItems.forEach(i => {
    const b = makeBlock(i, chars[i].status === 'correct' ? 'done-correct' : 'done-error');
    leftZone.appendChild(b);
  });
 
  // 右邊最多5個
  for (let i = cursor+1; i < Math.min(cursor+6, chars.length); i++) {
    rightZone.appendChild(makeBlock(i, 'pending'));
  }
 
  // 進度條
  const pct = chars.length > 0 ? (cursor / chars.length) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
 
  // HUD
  const elapsed = startTime ? (Date.now() - startTime) / 60000 : 0;
  const wpm = elapsed > 0 ? Math.round(correctCount / elapsed) : 0;
  document.getElementById('wpm-display').textContent = (startTime ? wpm : '--') + ' WPM';
  document.getElementById('stats-display').textContent = `✓ ${correctCount}  ✗ ${errorCount}`;
}
 
function makeBlock(idx, cls) {
  const d = chars[idx];
  const block = document.createElement('div');
  block.className = 'char-block ' + cls;
 
  const pRow = document.createElement('div');
  pRow.className = 'pinyin-row';
 
  if (cls === 'done-correct') {
    pRow.textContent = d.pinyins ? d.pinyins[0] : '';
  } else if (cls === 'done-error') {
    pRow.textContent = d.pinyins ? d.pinyins[0] : '';
  } else if (cls === 'focus') {
    pRow.textContent = d.pinyins ? d.pinyins[0] : '?';
  } else {
    pRow.textContent = '';
  }
 
  const cRow = document.createElement('div');
  cRow.className = 'char-row';
  cRow.textContent = d.char;
 
  block.appendChild(pRow);
  block.appendChild(cRow);
  return block;
}
 
// ============================================================
//  輸入處理
// ============================================================
const inputEl = document.getElementById('pinyin-input');
inputEl.addEventListener('input', handleInput);
 
function handleInput(e) {
  if (!running || cursor >= chars.length) return;
  if (!startTime) startTime = Date.now();
 
  const val = inputEl.value.toLowerCase().replace(/\s/g,'');
  inputEl.value = val;
 
  const target = chars[cursor];
  if (!target.pinyins) {
    // 無拼音字（罕見字）自動跳過
    advance(true);
    return;
  }
 
  // 檢查是否匹配任一拼音
  const matched = target.pinyins.some(py => val === py.toLowerCase());
  if (matched) {
    target.status = 'correct';
    if (!hasError) correctCount++;
    else errorCount++; // 錯過再答對，不加分，只加錯誤
    hasError = false;
    playCorrect();
    inputEl.value = '';
    inputEl.classList.remove('error');
    advance(true);
    return;
  }
 
  // 檢查是否已經不可能匹配（輸入長度超出所有拼音）
  const maxLen = Math.max(...target.pinyins.map(py => py.length));
  if (val.length >= maxLen) {
    triggerError(target);
    return;
  }
 
  // 檢查是否當前輸入是任一拼音的前綴
  const isPrefix = target.pinyins.some(py => py.toLowerCase().startsWith(val));
  if (!isPrefix && val.length > 0) {
    triggerError(target);
  }
}
 
function triggerError(target) {
  hasError = true;
  if (target.status !== 'error_shown') {
    errorCount++;
    target.status = 'error_shown';
  }
  playError();
  inputEl.classList.add('error');
  inputEl.classList.add('flash-error');
  setTimeout(() => inputEl.classList.remove('flash-error'), 300);
  inputEl.value = '';
  setTimeout(() => inputEl.classList.remove('error'), 400);
  render();
}
 
function advance(correct) {
  cursor++;
 
  // 循環模式：打完自動回到第一個字
  if (currentMode === 'loop' || currentMode === 'custom') {
    if (cursor >= chars.length) {
      chars.forEach(c => { c.status = 'pending'; });
      cursor = 0;
      hasError = false;
    }
  }
  // 隨機模式：補字
  else if (currentMode === 'random') {
    if (cursor >= chars.length - 5) {
      const allCharsRaw = POEMS.join('');
      const allHan = [...new Set([...allCharsRaw].filter(c => {
        const code = c.charCodeAt(0);
        return (code >= 0x4E00 && code <= 0x9FFF) || (code >= 0x3400 && code <= 0x4DBF);
      }))];
      for (let i = 0; i < 20; i++) {
        const ch = allHan[Math.floor(Math.random()*allHan.length)];
        chars.push({ char: ch, pinyins: getPinyin(ch), status:'pending' });
      }
    }
  }
  // 挑戰模式：補字
  else if (currentMode === 'challenge') {
    if (cursor >= chars.length - 5) {
      const allCharsRaw = POEMS.join('');
      const allHan = [...new Set([...allCharsRaw].filter(c => {
        const code = c.charCodeAt(0);
        return (code >= 0x4E00 && code <= 0x9FFF) || (code >= 0x3400 && code <= 0x4DBF);
      }))];
      for (let i = 0; i < 20; i++) {
        const ch = allHan[Math.floor(Math.random()*allHan.length)];
        chars.push({ char: ch, pinyins: getPinyin(ch), status:'pending' });
      }
    }
  }
 
  render();
}
 
// ============================================================
//  挑戰結束
// ============================================================
function endChallenge() {
  clearInterval(timerInterval);
  running = false;
  const elapsed = challengeSeconds / 60;
  const wpm = Math.round(correctCount / elapsed);
  const total = correctCount + errorCount;
  const acc = total > 0 ? Math.round(correctCount / total * 100) : 0;
 
  document.getElementById('result-wpm-val').textContent = wpm;
  document.getElementById('result-acc-val').textContent = `正確率 ${acc}%`;
  document.getElementById('result-screen').style.display = 'flex';
 
  // 儲存
  saveRecord({
    timestamp: new Date().toISOString(),
    wpm, accuracy: acc,
    mode: currentMode
  });
}
 
function restartChallenge() {
  document.getElementById('result-screen').style.display = 'none';
  startPractice();
}
 
function goMenu() {
  document.getElementById('result-screen').style.display = 'none';
  clearInterval(timerInterval);
  running = false;
  document.getElementById('menu-screen').style.display = 'flex';
}
 
// ============================================================
//  統計
// ============================================================
async function showStats() {
  const records = await getAllRecords();
  const tbody = document.getElementById('stats-tbody');
  tbody.innerHTML = '';
 
  if (records.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:#444;text-align:center;padding:30px">尚無挑戰紀錄</td></tr>';
  } else {
    const sorted = [...records].reverse().slice(0, 20);
    sorted.forEach(r => {
      const tr = document.createElement('tr');
      const dt = new Date(r.timestamp);
      const dateStr = `${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours().toString().padStart(2,'0')}:${dt.getMinutes().toString().padStart(2,'0')}`;
      const modeNames = { loop:'循環', random:'亂序', custom:'自定義', challenge:'挑戰' };
      tr.innerHTML = `<td>${dateStr}</td><td>${modeNames[r.mode]||r.mode}</td><td class="wpm-cell">${r.wpm}</td><td class="acc-cell">${r.accuracy}%</td>`;
      tbody.appendChild(tr);
    });
 
    // 長條圖
    const chart = document.getElementById('wpm-chart');
    chart.innerHTML = '';
    const recent = [...records].reverse().slice(0, 15).reverse();
    const maxWpm = Math.max(...recent.map(r => r.wpm), 1);
    recent.forEach(r => {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = Math.max(4, (r.wpm / maxWpm * 70)) + 'px';
      bar.title = `${r.wpm} WPM`;
      chart.appendChild(bar);
    });
  }
 
  document.getElementById('stats-screen').style.display = 'flex';
}
 
function hideStats() {
  document.getElementById('stats-screen').style.display = 'none';
}
 
// ============================================================
//  初始化
// ============================================================
function hideLoding() {
  document.getElementById('loading-overlay').style.display = 'none';
}
 
function checkPinyinProReady() {
  return new Promise((resolve, reject) => {
    let tries = 0;
    const check = () => {
      if (typeof pinyinPro !== 'undefined' && typeof pinyinPro.pinyin === 'function') {
        resolve();
      } else if (tries++ > 50) {
        reject(new Error('pinyinPro not loaded'));
      } else {
        setTimeout(check, 100);
      }
    };
    check();
  });
}
 
checkPinyinProReady()
  .then(() => {
    hideLoding();
    return initDB();
  })
  .then(() => {
    fillPoemSelect();
    selectMode('loop');
  })
  .catch(() => {
    document.getElementById('load-error').style.display = 'block';
    document.querySelector('#loading-overlay div').textContent = '載入失敗';
  });
 
// 點擊舞台聚焦輸入框
document.getElementById('stage').addEventListener('click', () => {
  document.getElementById('pinyin-input').focus();
});
</script>
