<!--
================================================================================
  PIANO SIMULATOR — 設計筆記
  最後更新：2026-04-02
  版本：v4
================================================================================

## 專案概述
  單一 HTML 檔案的趣味鋼琴模擬器。
  目標：好玩、輕量、能彈、能錄、能匯出 MIDI 當鈴聲。

--------------------------------------------------------------------------------
## 技術選擇
  音訊引擎   → Web Audio API（原生 JS，無外部 library）
  儲存方案   → localStorage + JSON 下載
  MIDI 匯出  → 純 JS 手寫二進位（Uint8Array，Format 0，480 ticks/beat）

--------------------------------------------------------------------------------
## 音訊節點結構（每個音）
  音色：3 振盪器疊加
    Osc1: triangle × 1.0，gain 0.7  → 基音
    Osc2: sine     × 2.0，gain 0.18 → 2次諧波
    Osc3: sine     × 3.0，gain 0.07 → 3次諧波
    → envGain → DynamicsCompressor → destination
  ADSR：Attack 8ms / Decay→Sustain 0.65 at 60ms / Release timeConstant 0.04
  DynamicsCompressor：threshold -12 / ratio 4 / attack 3ms / release 150ms

--------------------------------------------------------------------------------
## 鍵盤架構（v4 全面重設計）

  全音域：C2～B6（60個白鍵，MIDI 36～95）
  顯示視窗：由 rangeCenter（中心 MIDI）+ keyScale（縮放）決定要顯示幾個白鍵
  填滿螢幕：白鍵寬 = stageWidth / 可視白鍵數，鍵盤永遠撐滿畫面寬度

  keyScale（+/- 按鈕控制）：
    每按一次 + 減少可視白鍵數（鍵變大）
    每按一次 - 增加可視白鍵數（鍵變小）
    範圍：7～60 個白鍵（最大一個八度，最小全部）

  rangeCenter（音域滑桿控制）：
    滑桿值 = 中心白鍵的 MIDI 編號
    鍵盤以 rangeCenter 為中心，左右各顯示一半的可視白鍵
    兩端不足時自動靠邊對齊

  直立模式（portrait）：
    偵測 window.innerHeight > window.innerWidth
    琴鍵分兩排：高八度在上，低八度在下
    每排獨立 flex，各自填滿螢幕寬度
    分割點：以 rangeCenter 為中心，上下各一半

--------------------------------------------------------------------------------
## 介面佈局（v4）

  頂部控制列（一行，所有按鈕）：
    [－8va] [標準] [＋8va]  [─]  [+] [-]  [狀態]  [●REC] [▶] [↓儲存] [↓MIDI] [↑載入]
  音域滑桿列：
    [C2 ←──────────────── 滑桿 ───────────────→ B6]
  音名顯示列：
    [音名] [Hz]  ● ● ● ● ● ● ● ●（錄音點）
  鋼琴主體：
    橫屏：一排填滿
    直立：上排（高音）+ 下排（低音）

  底部清單：已儲存旋律 chip

--------------------------------------------------------------------------------
## 按鈕事件修正（v3.1 延續）
  addBtnListener(el, fn)：同時綁 click + touchend（防 touch-action:none 吃掉 click）
  所有控制列按鈕都用此函式

--------------------------------------------------------------------------------
## 防卡鍵機制
  touchIdMap (Map)：touchIdentifier → baseMidi，精確多指對應
  touchend/cancel：只釋放 changedTouches 對應的音，不 releaseAll()
  mouseup / blur：releaseAll()

================================================================================
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PIANO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;700&display=swap');

:root {
  --bg:              #0e0e0e;
  --panel:           #171717;
  --panel2:          #1f1f1f;
  --border:          #2e2e2e;
  --accent:          #c8a96e;
  --accent2:         #e8c98a;
  --wk-bg:           #f4f0e8;
  --wk-press:        #c8a96e;
  --bk-bg:           #1c1c1c;
  --bk-press:        #b8923e;
  --text:            #ccc;
  --text-dim:        #555;
  --red:             #e05c5c;
}

* {
  box-sizing: border-box; margin: 0; padding: 0;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

/* 控制列元素恢復可點擊 */
#topbar, #topbar-row1, #topbar-row2,
#range-row, .oct-btn, .sz-btn, .action-btn,
#range-slider, #bottom, .melody-chip {
  touch-action: auto;
}

html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  display: flex; flex-direction: column;
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── TOPBAR ── */
#topbar {
  flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
#topbar-row1 {
  display: flex; align-items: center; flex-wrap: wrap;
  padding: 5px 8px; gap: 5px;
  border-bottom: 1px solid var(--border);
}
#topbar-row2 {
  display: flex; align-items: center; justify-content: flex-end;
  padding: 4px 8px; gap: 5px;
}

.oct-btn, .sz-btn {
  background: var(--panel2); color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 4px 9px; border-radius: 4px;
  font-family: 'DM Mono', monospace; font-size: 0.7em;
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.oct-btn.active { background: var(--accent); color: #111; border-color: var(--accent); font-weight: 500; }
.sz-btn { font-size: 0.9em; padding: 3px 10px; }

#status {
  font-size: 0.62em; color: var(--text-dim);
  letter-spacing: 0.07em; text-transform: uppercase;
  margin-left: auto; min-width: 64px; text-align: right;
}
#status.rec  { color: var(--red);    animation: blink 1s step-start infinite; }
#status.play { color: var(--accent2); }
@keyframes blink { 50% { opacity: 0.3; } }

.action-btn {
  background: var(--panel2); color: var(--text);
  border: 1px solid var(--border);
  padding: 4px 8px; border-radius: 4px;
  font-family: 'DM Mono', monospace; font-size: 0.65em;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.action-btn:active { filter: brightness(1.3); }
.action-btn.rec-active { border-color: var(--red); color: var(--red); }
.action-btn.disabled   { opacity: 0.25; pointer-events: none; }
#file-input { display: none; }

/* ── RANGE SLIDER ROW ── */
#range-row {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
#range-label-lo, #range-label-hi {
  font-size: 0.58em; color: var(--text-dim);
  white-space: nowrap; flex-shrink: 0;
}
#range-slider {
  flex: 1; height: 4px; cursor: pointer;
  -webkit-appearance: none; appearance: none;
  background: var(--border); border-radius: 2px; outline: none;
}
#range-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
}
#range-slider::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); cursor: pointer; border: none;
}
#range-center-label {
  font-size: 0.58em; color: var(--accent);
  min-width: 28px; text-align: center; flex-shrink: 0;
}

/* ── NOTE DISPLAY ── */
#note-display {
  flex-shrink: 0;
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 2px 10px; height: 24px;
  display: flex; align-items: center; gap: 8px;
}
#note-label {
  font-family: 'Playfair Display', serif;
  font-size: 0.9em; color: var(--accent); min-width: 40px;
}
#note-freq { font-size: 0.6em; color: var(--text-dim); }
#rec-bar { display: flex; gap: 3px; margin-left: auto; align-items: center; }
.rec-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border); transition: background 0.1s;
}
.rec-dot.lit { background: var(--accent); }

/* ── PIANO STAGE ── */
#stage {
  flex: 1;
  display: flex; flex-direction: column;
  background: radial-gradient(ellipse at center bottom, #1e1a14 0%, var(--bg) 70%);
  position: relative; overflow: hidden;
}
#stage::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
  background: linear-gradient(to bottom, #2a1f0e, #1a1208);
  border-bottom: 1px solid #3d2b10; z-index: 5;
}

/* portrait 直立模式：分割線 */
#stage-divider {
  display: none; height: 6px;
  background: linear-gradient(to bottom, #1a1208, #2a1f0e);
  border-top: 1px solid #3d2b10; border-bottom: 1px solid #3d2b10;
  flex-shrink: 0;
}

.keyboard-row {
  flex: 1; position: relative;
  display: flex; align-items: flex-start;
  justify-content: center;
  overflow: hidden;
  padding-top: 6px;
}

/* ── KEYS ── */
.wk {
  position: relative; flex-shrink: 0;
  height: 100%;
  background: linear-gradient(to bottom, #e8e0cc 0%, var(--wk-bg) 15%, #ede8dc 100%);
  border: 1px solid #b0a898; border-top: none;
  border-radius: 0 0 6px 6px; cursor: pointer; z-index: 1;
  box-shadow: 2px 3px 6px rgba(0,0,0,0.5), inset 1px 0 0 rgba(255,255,255,0.25);
  transition: background 0.05s;
}
.wk.pressed {
  background: linear-gradient(to bottom, var(--wk-press) 0%, #e8b87a 100%);
  box-shadow: 1px 1px 3px rgba(0,0,0,0.5); transform: translateY(1px);
}
.wk::after {
  content: attr(data-label);
  position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
  font-size: 0.4em; color: #a09080; pointer-events: none;
}
.bk {
  position: absolute; top: 6px; /* offset for wood rail */
  height: 58%; z-index: 2;
  background: linear-gradient(to bottom, #2e2e2e, var(--bk-bg) 60%, #111);
  border: 1px solid #111; border-top: none;
  border-radius: 0 0 4px 4px; cursor: pointer;
  box-shadow: 2px 4px 8px rgba(0,0,0,0.8), inset 1px 0 0 rgba(255,255,255,0.05);
  transition: background 0.05s;
}
.bk.pressed {
  background: linear-gradient(to bottom, var(--bk-press), #8a6022);
  transform: translateY(1px); box-shadow: 1px 2px 4px rgba(0,0,0,0.8);
}

/* ── BOTTOM ── */
#bottom {
  flex-shrink: 0; background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 4px 10px; height: 28px;
  display: flex; align-items: center; gap: 6px;
  overflow-x: auto; overflow-y: hidden;
}
#bottom-label { font-size: 0.56em; color: var(--text-dim); text-transform: uppercase; flex-shrink: 0; }
.melody-chip {
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--text); padding: 2px 8px; border-radius: 20px;
  font-size: 0.6em; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.melody-chip.playing { border-color: var(--accent2); color: var(--accent2); }
.melody-chip .del { margin-left: 5px; color: var(--text-dim); font-size: 0.9em; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div id="topbar-row1">
    <button class="oct-btn" id="oct-lo">－8va</button>
    <button class="oct-btn active" id="oct-mid">標準</button>
    <button class="oct-btn" id="oct-hi">＋8va</button>
    <span style="color:var(--border);margin:0 2px">│</span>
    <button class="sz-btn" id="sz-plus">＋</button>
    <button class="sz-btn" id="sz-minus">－</button>
    <div id="status">READY</div>
  </div>
  <div id="topbar-row2">
    <button class="action-btn" id="btn-rec">● REC</button>
    <button class="action-btn disabled" id="btn-play">▶ 播放</button>
    <button class="action-btn disabled" id="btn-save">↓ 儲存</button>
    <button class="action-btn disabled" id="btn-midi">↓ MIDI</button>
    <button class="action-btn" id="btn-load">↑ 載入</button>
    <input type="file" id="file-input" accept=".json">
  </div>
</div>

<!-- RANGE SLIDER -->
<div id="range-row">
  <span id="range-label-lo">C2</span>
  <input type="range" id="range-slider" min="36" max="95" value="64">
  <span id="range-center-label">E4</span>
  <span id="range-label-hi">B6</span>
</div>

<!-- NOTE DISPLAY -->
<div id="note-display">
  <div id="note-label">—</div>
  <div id="note-freq"></div>
  <div id="rec-bar">
    <div class="rec-dot" id="rd0"></div><div class="rec-dot" id="rd1"></div>
    <div class="rec-dot" id="rd2"></div><div class="rec-dot" id="rd3"></div>
    <div class="rec-dot" id="rd4"></div><div class="rec-dot" id="rd5"></div>
    <div class="rec-dot" id="rd6"></div><div class="rec-dot" id="rd7"></div>
  </div>
</div>

<!-- PIANO -->
<div id="stage">
  <div class="keyboard-row" id="row-top"></div>
  <div id="stage-divider"></div>
  <div class="keyboard-row" id="row-bot"></div>
</div>

<!-- SAVED -->
<div id="bottom">
  <span id="bottom-label">已儲存</span>
</div>

<script>
// ══════════════════════════════════════════
//  FULL NOTE TABLE  C2(36) ~ B6(95)
// ══════════════════════════════════════════
// 產生完整音域資料：[midi, noteName, isBlack]
const BLACK_PATTERN = [false,true,false,true,false,false,true,false,true,false,true,false]; // C..B
const NOTE_NAMES    = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ALL_NOTES = [];   // index = midi-36
const MIDI_MIN = 36, MIDI_MAX = 95;
for (let m = MIDI_MIN; m <= MIDI_MAX; m++) {
  const deg    = (m - 60 + 120) % 12;
  const oct    = Math.floor((m - 12) / 12);
  const isBlack = BLACK_PATTERN[deg];
  ALL_NOTES.push({ midi: m, name: NOTE_NAMES[deg] + oct, isBlack });
}

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let audioCtx      = null;
let compressor    = null;
let octaveOffset  = 0;
let isRecording   = false;
let isPlaying     = false;
let recordStart   = 0;
let recordEvents  = [];
let activeOscs    = {};
let pressedBase   = new Set();
let touchIdMap    = new Map();
let savedMelodies = [];
let playbackTimers = [];

// 鍵盤顯示狀態
let keyScale    = 0;   // 0=預設全填滿；正數=縮小（鍵變大），負數=放大（鍵變小）
                       // 實際可視白鍵數 = baseWhiteCount - keyScale * 2
let rangeCenter = 64;  // 中心 MIDI（預設 E4）
let isPortrait  = false;

// ══════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════
function initAudio() {
  if (!audioCtx) {
    audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.value = -12;
    compressor.knee.value      = 8;
    compressor.ratio.value     = 4;
    compressor.attack.value    = 0.003;
    compressor.release.value   = 0.15;
    compressor.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

function createNoteOscs(freq) {
  const now = audioCtx.currentTime;
  const envGain = audioCtx.createGain();
  envGain.gain.setValueAtTime(0, now);
  envGain.gain.linearRampToValueAtTime(0.85, now + 0.008);
  envGain.gain.linearRampToValueAtTime(0.65, now + 0.06);
  envGain.connect(compressor);
  const defs = [
    { type:'triangle', mult:1,   vol:0.7  },
    { type:'sine',     mult:2,   vol:0.18 },
    { type:'sine',     mult:3,   vol:0.07 },
  ];
  const oscs = defs.map(({ type, mult, vol }) => {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq * mult, now);
    g.gain.setValueAtTime(vol, now);
    osc.connect(g); g.connect(envGain); osc.start();
    return osc;
  });
  return { oscs, envGain };
}

function stopNoteOscs(data) {
  const now = audioCtx.currentTime;
  data.envGain.gain.cancelScheduledValues(now);
  data.envGain.gain.setValueAtTime(data.envGain.gain.value, now);
  data.envGain.gain.setTargetAtTime(0, now, 0.04);
  setTimeout(() => {
    data.oscs.forEach(o => { try { o.stop(); o.disconnect(); } catch(e){} });
    try { data.envGain.disconnect(); } catch(e){}
  }, 300);
}

function noteOn(baseMidi) {
  initAudio();
  const midi = baseMidi + octaveOffset;
  if (activeOscs[midi]) return;
  const freq = midiToFreq(midi);
  activeOscs[midi] = createNoteOscs(freq);
  pressedBase.add(baseMidi);
  keyEl(baseMidi)?.classList.add('pressed');
  const note = ALL_NOTES.find(n => n.midi === baseMidi);
  showNote(note?.name || '', freq);
  if (isRecording)
    recordEvents.push({ type:'on', midi, time: Date.now() - recordStart });
}

function noteOff(baseMidi) {
  const midi = baseMidi + octaveOffset;
  if (activeOscs[midi]) { stopNoteOscs(activeOscs[midi]); delete activeOscs[midi]; }
  pressedBase.delete(baseMidi);
  keyEl(baseMidi)?.classList.remove('pressed');
  if (pressedBase.size === 0 && touchIdMap.size === 0) clearNote();
  if (isRecording)
    recordEvents.push({ type:'off', midi, time: Date.now() - recordStart });
}

function releaseAll() {
  [...pressedBase].forEach(m => noteOff(m));
  touchIdMap.forEach(m => noteOff(m));
  touchIdMap.clear(); pressedBase.clear();
  Object.keys(activeOscs).forEach(k => {
    const d = activeOscs[k];
    if (d.oscs) d.oscs.forEach(o => { try { o.stop(); o.disconnect(); } catch(e){} });
    try { d.envGain?.disconnect(); } catch(e){}
    delete activeOscs[k];
  });
  document.querySelectorAll('.pressed').forEach(el => el.classList.remove('pressed'));
}

function keyEl(midi) { return document.querySelector(`[data-midi="${midi}"]`); }

// ══════════════════════════════════════════
//  KEYBOARD BUILD
//  portrait: 上排高音 / 下排低音，各自填滿寬度
//  landscape: 單排，以 rangeCenter 為中心填滿
// ══════════════════════════════════════════
const ALL_WHITES = ALL_NOTES.filter(n => !n.isBlack);
const TOTAL_WHITES = ALL_WHITES.length; // C2~B6 共 35 個白鍵

function getVisibleWhiteCount() {
  // 基準：填滿 = TOTAL_WHITES，每次 +/- 調整 2 個白鍵
  const base = isPortrait ? Math.floor(TOTAL_WHITES / 2) : TOTAL_WHITES;
  const count = base - keyScale * 2;
  return Math.max(7, Math.min(TOTAL_WHITES, count));
}

function getVisibleRange(centerMidi, visibleWhiteCount, isTop) {
  // 找出以 centerMidi 為中心的可視範圍
  // isTop: portrait 上排（高音半段）/ isTop=false 下排（低音半段）
  const centerIdx = ALL_WHITES.findIndex(n => n.midi >= centerMidi);
  const half = Math.floor(visibleWhiteCount / 2);

  let lo, hi;
  if (isTop === undefined) {
    // landscape 單排
    lo = Math.max(0, centerIdx - half);
    hi = lo + visibleWhiteCount - 1;
    if (hi >= TOTAL_WHITES) { hi = TOTAL_WHITES - 1; lo = Math.max(0, hi - visibleWhiteCount + 1); }
  } else if (isTop) {
    // portrait 上排：centerMidi 到最高音
    lo = centerIdx;
    hi = Math.min(TOTAL_WHITES - 1, lo + visibleWhiteCount - 1);
  } else {
    // portrait 下排：最低音到 centerMidi-1
    hi = centerIdx - 1;
    lo = Math.max(0, hi - visibleWhiteCount + 1);
  }
  return ALL_WHITES.slice(lo, hi + 1);
}

function buildRow(rowEl, whites, stageW) {
  rowEl.innerHTML = '';
  if (!whites.length) return;

  const WW = Math.floor(stageW / whites.length);
  const BW = Math.round(WW * 0.62);

  // 白鍵 wrapper（需要相對定位以放黑鍵）
  const wrap = document.createElement('div');
  wrap.style.cssText = `position:relative; display:flex; width:${WW * whites.length}px; height:100%;`;

  // 建白鍵
  whites.forEach((note, i) => {
    const div = document.createElement('div');
    div.className     = 'wk';
    div.dataset.midi  = note.midi;
    div.dataset.label = note.name;
    div.style.width   = WW + 'px';

    div.addEventListener('mousedown', e => { e.preventDefault(); noteOn(note.midi); });
    div.addEventListener('touchstart', e => {
      e.preventDefault();
      [...e.changedTouches].forEach(t => { touchIdMap.set(t.identifier, note.midi); noteOn(note.midi); });
    }, { passive: false });

    wrap.appendChild(div);
  });

  // 建黑鍵（找在 whites 範圍內的黑鍵）
  const loMidi = whites[0].midi;
  const hiMidi = whites[whites.length - 1].midi;
  ALL_NOTES.filter(n => n.isBlack && n.midi > loMidi && n.midi < hiMidi + 2).forEach(note => {
    // 找這個黑鍵左邊的白鍵在 whites 中的 index
    const leftWhite = ALL_WHITES.filter(w => !w.isBlack && w.midi < note.midi);
    const leftInRange = leftWhite.filter(w => w.midi >= loMidi);
    const leftIdx = leftInRange.length - 1;
    if (leftIdx < 0 || leftIdx >= whites.length) return;

    const leftPx = (leftIdx + 1) * WW - BW / 2;

    const div = document.createElement('div');
    div.className    = 'bk';
    div.dataset.midi = note.midi;
    div.style.left   = leftPx + 'px';
    div.style.width  = BW + 'px';

    div.addEventListener('mousedown', e => { e.preventDefault(); noteOn(note.midi); });
    div.addEventListener('touchstart', e => {
      e.preventDefault();
      [...e.changedTouches].forEach(t => { touchIdMap.set(t.identifier, note.midi); noteOn(note.midi); });
    }, { passive: false });

    wrap.appendChild(div);
  });

  rowEl.appendChild(wrap);
}

function rebuildKeyboard() {
  isPortrait = window.innerHeight > window.innerWidth;
  const stageW = window.innerWidth
    - parseInt(getComputedStyle(document.body).paddingLeft  || 0)
    - parseInt(getComputedStyle(document.body).paddingRight || 0);

  const rowTop = document.getElementById('row-top');
  const rowBot = document.getElementById('row-bot');
  const divider = document.getElementById('stage-divider');

  const visCount = getVisibleWhiteCount();

  if (isPortrait) {
    divider.style.display = 'block';
    rowBot.style.display  = 'flex';

    // 上排：高音半
    const halfCount = Math.ceil(visCount / 2);
    const topWhites = getVisibleRange(rangeCenter, halfCount, true);
    const botWhites = getVisibleRange(rangeCenter, Math.floor(visCount / 2), false);
    buildRow(rowTop, topWhites, stageW);
    buildRow(rowBot, botWhites, stageW);
  } else {
    divider.style.display = 'none';
    rowBot.style.display  = 'none';

    const whites = getVisibleRange(rangeCenter, visCount, undefined);
    buildRow(rowTop, whites, stageW);
  }
}

// ══════════════════════════════════════════
//  TOUCH RELEASE
// ══════════════════════════════════════════
function handleTouchEnd(e) {
  e.preventDefault();
  [...e.changedTouches].forEach(t => {
    const midi = touchIdMap.get(t.identifier);
    if (midi !== undefined) { noteOff(midi); touchIdMap.delete(t.identifier); }
  });
}
window.addEventListener('touchend',    handleTouchEnd, { passive: false });
window.addEventListener('touchcancel', handleTouchEnd, { passive: false });
window.addEventListener('mouseup',  releaseAll);
window.addEventListener('blur',     releaseAll);

// ══════════════════════════════════════════
//  RESIZE / ORIENTATION
// ══════════════════════════════════════════
window.addEventListener('resize', () => {
  releaseAll();
  rebuildKeyboard();
});

// ══════════════════════════════════════════
//  PC KEYBOARD
// ══════════════════════════════════════════
const KEY_MAP = {
  'z':55,'s':56,'x':57,'d':58,'c':59,
  'v':60,'g':61,'b':62,'h':63,'n':64,
  'm':65,'j':66,',':67,'k':68,'.':69,
  'l':70,'/':71,'q':72,'2':73,'w':74,'3':75,'e':76
};
const heldKeys = new Set();
window.addEventListener('keydown', e => {
  if (e.repeat) return;
  const midi = KEY_MAP[e.key.toLowerCase()];
  if (midi && !heldKeys.has(e.key)) { heldKeys.add(e.key); initAudio(); noteOn(midi); }
});
window.addEventListener('keyup', e => {
  const midi = KEY_MAP[e.key.toLowerCase()];
  if (midi) { heldKeys.delete(e.key); noteOff(midi); }
});

// ══════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════
function showNote(name, freq) {
  document.getElementById('note-label').textContent = name || '—';
  document.getElementById('note-freq').textContent  = freq ? Math.round(freq) + ' Hz' : '';
}
function clearNote() {
  document.getElementById('note-label').textContent = '—';
  document.getElementById('note-freq').textContent  = '';
}
function setStatus(msg, cls = '') {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = cls;
}

let dotTimer = null, dotCount = 0;
function startDots() {
  dotCount = 0;
  dotTimer = setInterval(() => {
    dotCount = (dotCount + 1) % 9;
    for (let i = 0; i < 8; i++)
      document.getElementById('rd' + i).classList.toggle('lit', i < dotCount);
  }, 280);
}
function stopDots() {
  clearInterval(dotTimer);
  for (let i = 0; i < 8; i++) document.getElementById('rd' + i).classList.remove('lit');
}

// ══════════════════════════════════════════
//  BUTTON HELPER（PC click + 手機 touchend）
// ══════════════════════════════════════════
function addBtnListener(el, fn) {
  el.addEventListener('click', fn);
  el.addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); fn(); });
}

// ══════════════════════════════════════════
//  OCTAVE BUTTONS
// ══════════════════════════════════════════
['oct-lo','oct-mid','oct-hi'].forEach(id => {
  addBtnListener(document.getElementById(id), () => {
    releaseAll();
    octaveOffset = id === 'oct-lo' ? -12 : id === 'oct-hi' ? 12 : 0;
    document.querySelectorAll('.oct-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  });
});

// ══════════════════════════════════════════
//  KEY SIZE BUTTONS  (+/-)
// ══════════════════════════════════════════
addBtnListener(document.getElementById('sz-plus'), () => {
  keyScale++;
  if (getVisibleWhiteCount() <= 7) keyScale--; // 不超過最小值
  releaseAll(); rebuildKeyboard();
});
addBtnListener(document.getElementById('sz-minus'), () => {
  keyScale--;
  if (getVisibleWhiteCount() >= TOTAL_WHITES) keyScale++; // 不超過最大值
  releaseAll(); rebuildKeyboard();
});

// ══════════════════════════════════════════
//  RANGE SLIDER
// ══════════════════════════════════════════
const rangeSlider = document.getElementById('range-slider');
rangeSlider.addEventListener('input', () => {
  rangeCenter = parseInt(rangeSlider.value);
  const note  = ALL_NOTES.find(n => n.midi === rangeCenter);
  document.getElementById('range-center-label').textContent = note?.name || '';
  releaseAll(); rebuildKeyboard();
});

// ══════════════════════════════════════════
//  RECORDING
// ══════════════════════════════════════════
const btnRec  = document.getElementById('btn-rec');
const btnPlay = document.getElementById('btn-play');
const btnSave = document.getElementById('btn-save');
const btnMidi = document.getElementById('btn-midi');

addBtnListener(btnRec, () => {
  if (isPlaying) return;
  if (!isRecording) {
    isRecording = true; recordEvents = []; recordStart = Date.now();
    btnRec.textContent = '■ STOP'; btnRec.classList.add('rec-active');
    [btnPlay, btnSave, btnMidi].forEach(b => b.classList.add('disabled'));
    setStatus('● REC', 'rec'); startDots();
  } else {
    isRecording = false; releaseAll();
    btnRec.textContent = '● REC'; btnRec.classList.remove('rec-active');
    stopDots();
    if (recordEvents.length > 0) {
      [btnPlay, btnSave, btnMidi].forEach(b => b.classList.remove('disabled'));
      setStatus('RECORDED');
    } else { setStatus('READY'); }
  }
});

// ══════════════════════════════════════════
//  PLAYBACK
// ══════════════════════════════════════════
function playEvents(events) {
  if (isRecording || isPlaying || !events?.length) return;
  initAudio();
  isPlaying = true; setStatus('▶ PLAY', 'play');
  btnRec.classList.add('disabled'); releaseAll(); playbackTimers = [];

  events.forEach(ev => {
    playbackTimers.push(setTimeout(() => {
      if (ev.type === 'on') {
        const freq = midiToFreq(ev.midi);
        activeOscs['pb' + ev.midi] = createNoteOscs(freq);
        const base = ev.midi - octaveOffset;
        keyEl(base)?.classList.add('pressed');
        const note = ALL_NOTES.find(n => n.midi === base);
        showNote(note?.name || '', freq);
      } else {
        if (activeOscs['pb' + ev.midi]) {
          stopNoteOscs(activeOscs['pb' + ev.midi]);
          delete activeOscs['pb' + ev.midi];
        }
        keyEl(ev.midi - octaveOffset)?.classList.remove('pressed');
      }
    }, ev.time));
  });

  const maxTime = events.reduce((m, e) => Math.max(m, e.time), 0);
  playbackTimers.push(setTimeout(() => {
    isPlaying = false;
    Object.keys(activeOscs).filter(k => k.startsWith('pb')).forEach(k => {
      const d = activeOscs[k];
      d.oscs?.forEach(o => { try { o.stop(); } catch(e){} });
      try { d.envGain?.disconnect(); } catch(e){}
      delete activeOscs[k];
    });
    document.querySelectorAll('.pressed').forEach(el => el.classList.remove('pressed'));
    setStatus('READY'); btnRec.classList.remove('disabled'); clearNote();
    document.querySelectorAll('.melody-chip').forEach(c => c.classList.remove('playing'));
  }, maxTime + 600));
}

addBtnListener(btnPlay, () => playEvents(recordEvents));

// ══════════════════════════════════════════
//  SAVE / LOAD
// ══════════════════════════════════════════
function loadSavedMelodies() {
  try { savedMelodies = JSON.parse(localStorage.getItem('piano_melodies') || '[]'); }
  catch(e) { savedMelodies = []; }
  renderChips();
}
function persist() { localStorage.setItem('piano_melodies', JSON.stringify(savedMelodies)); }

function renderChips() {
  const bottom = document.getElementById('bottom');
  bottom.querySelectorAll('.melody-chip').forEach(c => c.remove());
  savedMelodies.forEach((mel, i) => {
    const chip = document.createElement('div');
    chip.className = 'melody-chip';
    chip.innerHTML = `${mel.name}<span class="del" data-i="${i}"> ✕</span>`;
    chip.addEventListener('click', e => {
      if (e.target.dataset.i !== undefined) {
        savedMelodies.splice(+e.target.dataset.i, 1); persist(); renderChips(); return;
      }
      recordEvents = mel.events;
      [btnPlay, btnSave, btnMidi].forEach(b => b.classList.remove('disabled'));
      document.querySelectorAll('.melody-chip').forEach(c => c.classList.remove('playing'));
      chip.classList.add('playing'); playEvents(mel.events);
    });
    bottom.appendChild(chip);
  });
}

addBtnListener(btnSave, () => {
  if (!recordEvents.length) return;
  const name   = prompt('旋律名稱？') || ('旋律 ' + (savedMelodies.length + 1));
  const melody = { name, events: [...recordEvents] };
  savedMelodies.push(melody); persist(); renderChips();
  const blob = new Blob([JSON.stringify(melody, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name.replace(/\s+/g,'_') + '.json'; a.click();
  setStatus('SAVED'); setTimeout(() => setStatus('READY'), 1500);
});

addBtnListener(document.getElementById('btn-load'), () =>
  document.getElementById('file-input').click());

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data   = JSON.parse(ev.target.result);
      const events = Array.isArray(data) ? data : (data.events || data.data);
      if (!events?.length) throw 0;
      recordEvents = events;
      const name = data.name || file.name.replace(/\.json$/,'');
      savedMelodies.push({ name, events }); persist(); renderChips();
      [btnPlay, btnSave, btnMidi].forEach(b => b.classList.remove('disabled'));
      setStatus('LOADED'); setTimeout(() => setStatus('READY'), 1500);
    } catch { alert('讀取失敗：請確認是從本工具匯出的 JSON 檔'); }
  };
  reader.readAsText(file); e.target.value = '';
});

// ══════════════════════════════════════════
//  MIDI EXPORT
// ══════════════════════════════════════════
function toVarLen(v) {
  const b = [v & 0x7F];
  while (v >>= 7) b.push((v & 0x7F) | 0x80);
  return b.reverse();
}
function toI32(n) { return [(n>>24)&0xff,(n>>16)&0xff,(n>>8)&0xff,n&0xff]; }

function buildMidi(events) {
  const header = [0x4D,0x54,0x68,0x64,0,0,0,6,0,0,0,1,0x01,0xE0];
  let track = [], last = 0;
  events.forEach(ev => {
    const delta = Math.max(0, Math.floor((ev.time - last) * 480 / 1000));
    last = ev.time;
    track.push(...toVarLen(delta), ev.type==='on' ? 0x90 : 0x80, ev.midi, ev.type==='on' ? 100 : 0);
  });
  track.push(0x00,0xFF,0x2F,0x00);
  return new Uint8Array([...header, 0x4D,0x54,0x72,0x6B,...toI32(track.length),...track]);
}

addBtnListener(btnMidi, () => {
  if (!recordEvents.length) return;
  const blob = new Blob([buildMidi(recordEvents)], { type:'audio/midi' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `piano_${Date.now()}.mid`; a.click();
});

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
loadSavedMelodies();
rebuildKeyboard();
</script>
